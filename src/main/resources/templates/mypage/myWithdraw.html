<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원탈퇴 - EVCar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/mypage/myWithdraw.css}">
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<main class="ev-withdraw-page">
    <section class="ev-withdraw-section">
        <div class="ev-withdraw-container">
            <aside class="ev-mypage-sidebar">
                <h2 class="ev-mypage-sidebar__title">마이페이지</h2>
                <nav class="ev-mypage-sidebar__nav">
                    <a class="ev-mypage-sidebar__link" th:href="@{/mypage/main}">마이페이지 홈</a>
                    <a class="ev-mypage-sidebar__link" th:href="@{/mypage/info}">내 정보</a>
                    <a class="ev-mypage-sidebar__link" th:href="@{/mypage/wishlist}">관심 차량</a>
                    <a class="ev-mypage-sidebar__link" th:href="@{/mypage/consultation}">상담 이력</a>
                    <a class="ev-mypage-sidebar__link" th:href="@{/mypage/inquiry}">문의 내역</a>
                    <a class="ev-mypage-sidebar__link ev-mypage-sidebar__link--active" th:href="@{/mypage/withdraw}">회원탈퇴</a>
                    <a class="ev-mypage-sidebar__link" th:href="@{/logout}">로그아웃</a>
                </nav>
            </aside>

            <div class="ev-withdraw-content">
                <div class="ev-withdraw-header">
                    <p class="ev-withdraw-eyebrow">Account Withdrawal</p>
                    <h1 class="ev-withdraw-title">회원탈퇴</h1>
                    <p class="ev-withdraw-description">
                        회원탈퇴 시 관심 차량, 문의 작성, 권한 등을 더 이상 이용할 수 없으며 복구는 불가능합니다.
                    </p>
                </div>

                <div class="ev-withdraw-card">
                    <form th:action="@{/mypage/withdraw}" th:object="${withdrawRequestDto}" method="post" id="withdrawForm">
                        <div class="ev-withdraw-grid">
                            <div class="ev-form-group">
                                <label class="ev-form-label">아이디</label>
                                <input type="text" class="ev-input" th:value="${myPageInfo.loginId}" readonly>
                            </div>

                            <div class="ev-form-group">
                                <label class="ev-form-label" for="password">현재 비밀번호</label>
                                <input type="password"
                                       class="ev-input"
                                       id="password"
                                       th:field="*{password}"
                                       placeholder="현재 비밀번호 입력">
                            </div>

                            <div class="ev-form-group ev-form-group--full">
                                <label class="ev-form-label" for="withdrawReason">탈퇴 사유</label>
                                <select class="ev-input" id="withdrawReason" th:field="*{withdrawReason}">
                                    <option value="">선택</option>
                                    <option value="LOW_USAGE">이용빈도 낮음</option>
                                    <option value="SERVICE_DISSATISFACTION">서비스 불만</option>
                                    <option value="ETC">기타</option>
                                </select>
                            </div>
                        </div>

                        <div class="ev-withdraw-guide">
                            <p class="ev-withdraw-guide__text">
                                현재 진행중인 상담이 있는 경우 회원탈퇴가 제한될 수 있습니다.
                            </p>
                        </div>

                        <div class="ev-withdraw-agree">
                            <label class="ev-check-label" for="agreeWithdraw">
                                <input type="checkbox" id="agreeWithdraw" th:field="*{agreeWithdraw}">
                                <span>위 내용을 확인했으며 회원탈퇴에 동의합니다.</span>
                            </label>
                        </div>

                        <div class="ev-withdraw-actions">
                            <button type="submit" class="btn btn-ev-primary" id="withdrawSubmitBtn">탈퇴하기</button>
                            <a th:href="@{/mypage/main}" class="btn btn-ev-secondary">취소</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{layout/footer :: footer}"></div>
<div th:replace="~{fragments/chatbotWidget :: chatbot}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/mypage/myWithdraw.js}"></script>
</body>
</html>
