<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문의 상세 - EVCar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/common/common.css}">
<link rel="stylesheet" th:href="@{/css/mypage/mypageSidebar.css}">
<link rel="stylesheet" th:href="@{/css/mypage/mypageLayout.css}">
<link rel="stylesheet" th:href="@{/css/mypage/myInquiryDetail.css}">
</head>

<body>

<div th:replace="~{layout/header :: header}"></div>

<main class="ev-mypage-page">
    <section class="ev-mypage-section">
        <div class="ev-mypage-container">

            <div th:replace="~{mypage/sidebar :: sidebar('inquiry')}"></div>

            <div class="ev-mypage-content">
                <div class="ev-mypage-header">
                    <div class="ev-mypage-header__text">
                        <h1 class="ev-mypage-title">문의 상세</h1>
                        <p class="ev-mypage-description">등록한 문의 내용과 답변 상태를 확인할 수 있습니다.</p>
                    </div>

                    <div class="ev-mypage-header__actions">
                        <a class="btn btn-ev-secondary" th:href="@{/mypage/inquiry}">목록으로</a>
                        <a class="btn btn-ev-primary" th:href="@{/inquiry/form}">문의 작성하기</a>
                    </div>
                </div>

                <article class="ev-inquiry-detail-card" th:if="${inquiry != null}">
                    <div class="ev-inquiry-detail-card__top">
                        <div class="ev-inquiry-detail-card__title-box">
                            <span class="ev-inquiry-detail-card__id" th:text="${inquiry.inquiryId}"></span>
                            <h2 class="ev-inquiry-detail-card__title" th:text="${inquiry.title}"></h2>
                        </div>

                        <span class="ev-inquiry-detail-status"
                              th:classappend="${
                                  inquiry.replyStatus == 'REPLIED' ? ' ev-inquiry-detail-status--done' :
                                  (inquiry.replyStatus == 'CLOSED' ? ' ev-inquiry-detail-status--closed' :
                                  ' ev-inquiry-detail-status--waiting')
                              }"
                              th:text="${inquiry.replyStatusLabel != null ? inquiry.replyStatusLabel : (inquiry.answered ? '답변 완료' : '답변 대기')}">
                        </span>
                    </div>

                    <div class="ev-inquiry-detail-meta">
                        <div class="ev-inquiry-detail-meta__item">
                            <span class="ev-inquiry-detail-meta__label">작성일</span>
                            <span class="ev-inquiry-detail-meta__value"
                                  th:text="${#temporals.format(inquiry.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                        </div>

                        <div class="ev-inquiry-detail-meta__item"
                             th:if="${inquiry.updatedAt != null and inquiry.replyContent != null and !#strings.isEmpty(inquiry.replyContent)}">
                            <span class="ev-inquiry-detail-meta__label">답변일</span>
                            <span class="ev-inquiry-detail-meta__value"
                                  th:text="${#temporals.format(inquiry.updatedAt, 'yyyy-MM-dd HH:mm')}"></span>
                        </div>
                    </div>

                    <div class="ev-inquiry-detail-body">
                        <h3 class="ev-inquiry-detail-body__title">문의 내용</h3>
                        <div class="ev-inquiry-detail-body__content" th:text="${inquiry.content}"></div>
                    </div>

                    <div class="ev-inquiry-detail-reply"
                         th:if="${inquiry.replyContent != null and !#strings.isEmpty(inquiry.replyContent)}">
                        <h3 class="ev-inquiry-detail-reply__title">관리자 답변</h3>
                        <div class="ev-inquiry-detail-reply__content" th:text="${inquiry.replyContent}"></div>
                    </div>

                    <div class="ev-inquiry-detail-empty-reply"
                         th:if="${inquiry.replyContent == null or #strings.isEmpty(inquiry.replyContent)}">
                        <div class="ev-inquiry-detail-empty-reply__icon">⏳</div>
                        <h3 class="ev-inquiry-detail-empty-reply__title">답변 대기 중입니다</h3>
                        <p class="ev-inquiry-detail-empty-reply__text">
                            문의하신 내용은 담당자가 확인 후 빠르게 답변드릴 예정입니다.
                        </p>
                    </div>

                    <div class="ev-inquiry-detail-bottom-actions"
                         th:if="${inquiry.replyStatus == 'WAITING'}">
                        <form th:action="@{/inquiry/{id}/delete(id=${inquiry.inquiryId})}"
                              method="post"
                              onsubmit="return confirm('답변 대기 상태의 문의를 취소하시겠습니까?');">
                            <button type="submit" class="btn btn-ev-secondary">문의 취소</button>
                        </form>
                    </div>
                </article>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{layout/footer :: footer}"></div>
<div th:replace="~{fragments/chatbotWidget :: chatbot}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/common/footer.js}"></script>

</body>
</html>
