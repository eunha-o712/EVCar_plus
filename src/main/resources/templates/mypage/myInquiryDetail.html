<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문의 상세 - EVCar</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/common/common.css}">
<link rel="stylesheet" th:href="@{/css/mypage/myInquiryDetail.css}">
</head>
<body>
	<div th:replace="~{layout/header :: header}"></div>

	<main class="ev-inquiry-detail-page">
		<section class="ev-inquiry-detail-section">
			<div class="ev-inquiry-detail-container">
				<aside class="ev-mypage-sidebar">
					<h2 class="ev-mypage-sidebar__title">마이페이지</h2>
					<nav class="ev-mypage-sidebar__nav">
						<a class="ev-mypage-sidebar__link" th:href="@{/mypage/main}">마이페이지
							홈</a> <a class="ev-mypage-sidebar__link" th:href="@{/mypage/info}">내
							정보</a> <a class="ev-mypage-sidebar__link"
							th:href="@{/mypage/wishlist}">관심 차량</a> <a
							class="ev-mypage-sidebar__link" th:href="@{/mypage/consultation}">상담
							이력</a> <a
							class="ev-mypage-sidebar__link ev-mypage-sidebar__link--active"
							th:href="@{/mypage/inquiry}">문의 내역</a> <a
							class="ev-mypage-sidebar__link" th:href="@{/mypage/withdraw}">회원탈퇴</a>
						<a class="ev-mypage-sidebar__link" th:href="@{/logout}">로그아웃</a>
					</nav>
				</aside>

				<div class="ev-inquiry-detail-content">
					<div class="ev-inquiry-detail-header">
						<p class="ev-inquiry-detail-eyebrow">Inquiry Detail</p>
						<h1 class="ev-inquiry-detail-title">문의 상세</h1>
						<p class="ev-inquiry-detail-description">작성한 문의 내용과 답변 상태를 확인할 수 있습니다.</p>
					</div>

					<article class="ev-inquiry-detail-card">
						<div class="ev-inquiry-detail-card__top">
							<div>
								<h2 class="ev-inquiry-detail-card__title"
									th:text="${inquiry.title}">문의 제목</h2>
								<p class="ev-inquiry-detail-card__date"
									th:text="${#temporals.format(inquiry.createdAt, 'yyyy-MM-dd HH:mm')}">
									2026-03-26 15:00</p>
							</div>

							<span class="ev-inquiry-detail-status"
								th:classappend="${inquiry.answered} ? ' ev-inquiry-detail-status--done' : ' ev-inquiry-detail-status--waiting'"
								th:text="${inquiry.answered} ? '답변완료' : '답변대기'"> 답변대기 </span>
						</div>

						<div class="ev-inquiry-detail-block">
							<h3 class="ev-inquiry-detail-block__title">문의 내용</h3>
							<div class="ev-inquiry-detail-block__content"
								th:text="${inquiry.content}">문의 내용</div>
						</div>

						<div class="ev-inquiry-detail-block" th:if="${inquiry.answered}">
							<h3 class="ev-inquiry-detail-block__title">답변 내용</h3>
							<div class="ev-inquiry-detail-block__content"
								th:text="${inquiry.replyContent}">답변 내용</div>
						</div>

						<div class="ev-inquiry-detail-block" th:if="${!inquiry.answered}">
							<h3 class="ev-inquiry-detail-block__title">답변 상태</h3>
							<div class="ev-inquiry-detail-block__content">아직 답변이 등록되지 않았습니다. 답변 완료 후 이 화면에서 확인할 수 있습니다.</div>
						</div>

						<div class="ev-inquiry-detail-actions">
							<a class="btn btn-ev-secondary" th:href="@{/mypage/inquiry}">목록으로</a>
						</div>
					</article>
				</div>
			</div>
		</section>
	</main>

	<div th:replace="~{layout/footer :: footer}"></div>
	<div th:replace="~{fragments/chatbotWidget :: chatbot}"></div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
