<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상담 상세 - EVCar</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/common/common.css}">
<link rel="stylesheet" th:href="@{/css/mypage/mypageSidebar.css}">
<link rel="stylesheet" th:href="@{/css/mypage/mypageLayout.css}">
<link rel="stylesheet" th:href="@{/css/mypage/myConsultation.css}">
</head>
<body>

	<div th:replace="~{layout/header :: header}"></div>

	<main class="ev-mypage-page">
		<section class="ev-mypage-section">
			<div class="ev-mypage-container">
				<div th:replace="~{mypage/sidebar :: sidebar('consultation')}"></div>

				<div class="ev-mypage-content">
					<div class="ev-mypage-header">
						<div class="ev-mypage-header__text">
							<h1 class="ev-mypage-title">상담 상세</h1>
							<p class="ev-mypage-description">등록한 상담 내용과 진행 상태를 확인할 수
								있습니다.</p>
						</div>

						<div class="ev-mypage-header__actions">
							<a class="btn btn-ev-secondary" th:href="@{/mypage/consultation}">목록으로</a>
						</div>
					</div>

					<div class="ev-consultation-card">
						<div class="ev-consultation-card__body">
							<div class="ev-consultation-card__row">
								<span class="ev-consultation-card__label">상담번호</span> <span
									class="ev-consultation-card__value"
									th:text="${consultation.consultId}"></span>
							</div>

							<div class="ev-consultation-card__row">
								<span class="ev-consultation-card__label">희망 상담일시</span> <span
									class="ev-consultation-card__value"
									th:text="${consultation.preferredDatetime != null ? consultation.preferredDatetime : '-'}"></span>
							</div>

							<div class="ev-consultation-card__row">
								<span class="ev-consultation-card__label">예산</span> <span
									class="ev-consultation-card__value"
									th:text="${consultation.budget != null ? consultation.budget + '만원' : '-'}"></span>
							</div>

							<div class="ev-consultation-card__row">
								<span class="ev-consultation-card__label">구매 시기</span> <span
									class="ev-consultation-card__value"
									th:text="${consultation.purchasePlanLabel != null ? consultation.purchasePlanLabel : '-'}"></span>
							</div>

							<div class="ev-consultation-card__row">
								<span class="ev-consultation-card__label">상담 상태</span> <span
									class="ev-consultation-card__value"
									th:text="${consultation.consultStatusLabel != null ? consultation.consultStatusLabel : '-'}"></span>
							</div>

							<div class="ev-consultation-card__row"
								th:if="${consultation.consultResult != null and !#strings.isEmpty(consultation.consultResult)}">
								<span class="ev-consultation-card__label">상담 결과</span> <span
									class="ev-consultation-card__value"
									th:text="${consultation.consultResultLabel}"></span>
							</div>

							<div
								class="ev-consultation-card__row ev-consultation-card__row--full">
								<span class="ev-consultation-card__label">상담 내용</span> <span
									class="ev-consultation-card__value ev-consultation-card__value--multiline"
									th:text="${consultation.consultContent != null ? consultation.consultContent : '-'}"></span>
							</div>

							<div
								class="ev-consultation-card__row ev-consultation-card__row--full"
								th:if="${consultation.adminReply != null and !#strings.isEmpty(consultation.adminReply)}">
								<span class="ev-consultation-card__label">관리자 답변</span> <span
									class="ev-consultation-card__value ev-consultation-card__value--reply"
									th:text="${consultation.adminReply}"></span>
							</div>
						</div>

						<div class="ev-consultation-card__footer">
							<span class="ev-consultation-status"
								th:classappend="${consultation.consultStatus == 'COMPLETED'} ? ' ev-consultation-status--done'
                                              : (${consultation.consultStatus == 'CANCELED' or consultation.consultStatus == 'CANCELLED'} ? ' ev-consultation-status--cancel'
                                              : ' ev-consultation-status--progress')"
								th:text="${consultation.consultStatusLabel}"> </span>

							<form th:if="${consultation.cancelable}"
								th:action="@{/mypage/consultation/cancel}" method="post"
								class="ev-consultation-cancel-form"
								onsubmit="return confirm('상담을 취소하시겠습니까?');">
								<input type="hidden" name="consultId"
									th:value="${consultation.consultId}">
								<button type="submit"
									class="btn btn-ev-secondary ev-consultation-cancel-btn">취소</button>
							</form>

							<span th:if="${!consultation.cancelable}"
								class="ev-consultation-disabled-text">취소불가</span>
						</div>
					</div>
				</div>
			</div>
		</section>
	</main>

	<div th:replace="~{layout/footer :: footer}"></div>
	<div th:replace="~{fragments/chatbotWidget :: chatbot}"></div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script th:src="@{/js/common/footer.js}"></script>
	<script th:src="@{/js/mypage/myConsultation.js}"></script>

</body>
</html>
