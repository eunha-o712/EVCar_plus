<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 정보 - EVCar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/mypage/myInfo.css}">
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<main class="ev-myinfo-page">
    <section class="ev-myinfo-section">
        <div class="ev-myinfo-container">
            <aside class="ev-mypage-sidebar">
                <h2 class="ev-mypage-sidebar__title">마이페이지</h2>
                <nav class="ev-mypage-sidebar__nav">
                    <a class="ev-mypage-sidebar__link" th:href="@{/mypage/main}">마이페이지 홈</a>
                    <a class="ev-mypage-sidebar__link ev-mypage-sidebar__link--active" th:href="@{/mypage/info}">내 정보</a>
                    <a class="ev-mypage-sidebar__link" th:href="@{/mypage/wishlist}">관심 차량</a>
                    <a class="ev-mypage-sidebar__link" th:href="@{/mypage/consultation}">상담 이력</a>
                    <a class="ev-mypage-sidebar__link" th:href="@{/mypage/inquiry}">문의 내역</a>
                    <a class="ev-mypage-sidebar__link" th:href="@{/mypage/withdraw}">회원탈퇴</a>
                    <a class="ev-mypage-sidebar__link" th:href="@{/logout}">로그아웃</a>
                </nav>
            </aside>

            <div class="ev-myinfo-content">
                <div class="ev-myinfo-header">
                    <div>
                        <p class="ev-myinfo-eyebrow">My Page</p>
                        <h1 class="ev-myinfo-title">내 정보</h1>
                        <p class="ev-myinfo-description">
                            회원 정보를 확인하고 수정할 수 있습니다.
                        </p>
                    </div>

                    <div class="ev-myinfo-header-actions">
                        <button type="button" class="btn btn-ev-secondary" id="editModeButton">수정하기</button>
                        <button type="submit" class="btn btn-ev-primary ev-myinfo-hidden" id="saveButton" form="myInfoForm">저장</button>
                        <button type="button" class="btn btn-ev-secondary ev-myinfo-hidden" id="cancelButton">취소</button>
                    </div>
                </div>

                <div class="ev-myinfo-card">
                    <form id="myInfoForm"
                          th:action="@{/mypage/info}"
                          th:object="${myPageInfoUpdateRequestDto}"
                          method="post">

                        <div class="ev-myinfo-grid">
                            <div class="ev-myinfo-field">
                                <label class="ev-myinfo-label">이름</label>
                                <input type="text"
                                       class="ev-input ev-myinfo-input ev-myinfo-input--fixed"
                                       th:field="*{name}"
                                       readonly>
                            </div>

                            <div class="ev-myinfo-field">
                                <label class="ev-myinfo-label">생년월일</label>

                                <input type="text"
                                       id="birthDateDisplay"
                                       class="ev-input ev-myinfo-input ev-myinfo-input--fixed"
                                       th:value="${myPageInfo.birthDate != null ? #temporals.format(myPageInfo.birthDate, 'yyyy-MM-dd') : ''}"
                                       readonly>

                                <input type="date"
                                       id="birthDateInput"
                                       class="ev-input ev-myinfo-input ev-myinfo-hidden"
                                       th:field="*{birthDate}"
                                       data-editable="true"
                                       disabled>
                            </div>

                            <div class="ev-myinfo-field">
                                <label class="ev-myinfo-label">성별</label>
                                <div class="ev-myinfo-radio-group ev-myinfo-radio-group--fixed is-disabled">
                                    <label class="ev-myinfo-radio">
                                        <input type="radio"
                                               th:field="*{gender}"
                                               value="남"
                                               disabled>
                                        <span>남</span>
                                    </label>
                                    <label class="ev-myinfo-radio">
                                        <input type="radio"
                                               th:field="*{gender}"
                                               value="여"
                                               disabled>
                                        <span>여</span>
                                    </label>
                                </div>
                            </div>

                            <div class="ev-myinfo-field">
                                <label class="ev-myinfo-label">전화번호</label>
                                <input type="text"
                                       class="ev-input ev-myinfo-input"
                                       th:field="*{phone}"
                                       placeholder="010-0000-0000"
                                       data-editable="true"
                                       readonly>
                            </div>

                            <div class="ev-myinfo-field ev-myinfo-field--full">
                                <label class="ev-myinfo-label">주소</label>
                                <input type="text"
                                       class="ev-input ev-myinfo-input"
                                       th:field="*{address}"
                                       placeholder="기본 주소"
                                       data-editable="true"
                                       readonly>
                            </div>

                            <div class="ev-myinfo-field ev-myinfo-field--full">
                                <label class="ev-myinfo-label">상세 주소</label>
                                <input type="text"
                                       class="ev-input ev-myinfo-input"
                                       th:field="*{addressDetail}"
                                       placeholder="상세 주소"
                                       data-editable="true"
                                       readonly>
                            </div>

                            <div class="ev-myinfo-field">
                                <label class="ev-myinfo-label">이메일</label>
                                <input type="email"
                                       class="ev-input ev-myinfo-input"
                                       th:field="*{email}"
                                       placeholder="example@evcar.com"
                                       data-editable="true"
                                       readonly>
                            </div>

                            <div class="ev-myinfo-field ev-myinfo-field--full">
                                <label class="ev-myinfo-label">현재 비밀번호</label>
                                <input type="password"
                                       class="ev-input ev-myinfo-input"
                                       th:field="*{currentPassword}"
                                       data-editable="true"
                                       readonly>
                            </div>

                            <div class="ev-myinfo-field">
                                <label class="ev-myinfo-label">새 비밀번호</label>
                                <input type="password"
                                       class="ev-input ev-myinfo-input"
                                       th:field="*{newPassword}"
                                       data-editable="true"
                                       readonly>
                            </div>

                            <div class="ev-myinfo-field">
                                <label class="ev-myinfo-label">새 비밀번호 확인</label>
                                <input type="password"
                                       class="ev-input ev-myinfo-input"
                                       th:field="*{newPasswordConfirm}"
                                       data-editable="true"
                                       readonly>
                            </div>

                            <div class="ev-myinfo-field ev-myinfo-field--full">
                                <label class="ev-myinfo-label">차량소유여부</label>
                                <div class="ev-myinfo-radio-group" data-editable-group="hasVehicle">
                                    <label class="ev-myinfo-radio">
                                        <input type="radio"
                                               th:field="*{hasVehicle}"
                                               value="yes"
                                               disabled>
                                        <span>yes</span>
                                    </label>
                                    <label class="ev-myinfo-radio">
                                        <input type="radio"
                                               th:field="*{hasVehicle}"
                                               value="no"
                                               disabled>
                                        <span>no</span>
                                    </label>
                                </div>
                                <p class="ev-myinfo-help">차량소유여부가 no인 경우 아래 차량 정보는 비활성화되며 저장되지 않습니다.</p>
                            </div>

                     <div class="ev-myinfo-field">
    <label class="ev-myinfo-label">보유 차량명</label>
    <input type="text"
           class="ev-input ev-myinfo-input ev-vehicle-owned-field"
           th:field="*{vehicleModel}"
           placeholder="예: 아이오닉 5"
           data-editable="true"
           readonly>
</div>

<div class="ev-myinfo-field">
    <label class="ev-myinfo-label">보유차종 연식</label>

   <input type="text"
       id="vehicleYearDisplay"
       class="ev-input ev-myinfo-input ev-myinfo-input--fixed"
       th:value="${myPageInfo.vehicleYear != null ? myPageInfo.vehicleYear : ''}"
       readonly>

<input type="month"
       id="vehicleYearInput"
       class="ev-input ev-myinfo-input ev-vehicle-owned-field ev-myinfo-hidden"
       th:field="*{vehicleYear}"
       data-editable="true"
       disabled>
</div>
<div class="ev-myinfo-field">
    <label class="ev-myinfo-label">주행거리(Km)</label>
    <input type="number"
           class="ev-input ev-myinfo-input ev-vehicle-owned-field"
           th:field="*{drivingDistance}"
           placeholder="예: 12000"
           data-editable="true"
           readonly>
</div>
                        </div>

                        <div class="ev-myinfo-footer">
                            <a class="btn btn-ev-secondary" th:href="@{/mypage/withdraw}">회원탈퇴</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{layout/footer :: footer}"></div>
<div th:replace="~{fragments/chatbotWidget :: chatbot}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/mypage/myInfo.js}"></script>
</body>
</html>
