<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상담 이력 - EVCar</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/common/common.css}">
<link rel="stylesheet" th:href="@{/css/mypage/myConsultation.css}">
</head>
<body>
	<div th:replace="~{layout/header :: header}"></div>

	<main class="ev-consultation-page">
		<section class="ev-consultation-section">
			<div class="ev-consultation-container">
				<aside class="ev-mypage-sidebar">
					<h2 class="ev-mypage-sidebar__title">마이페이지</h2>
					<nav class="ev-mypage-sidebar__nav">
						<a class="ev-mypage-sidebar__link" th:href="@{/mypage/main}">마이페이지
							홈</a> <a class="ev-mypage-sidebar__link" th:href="@{/mypage/info}">내
							정보</a> <a class="ev-mypage-sidebar__link"
							th:href="@{/mypage/wishlist}">관심 차량</a> <a
							class="ev-mypage-sidebar__link ev-mypage-sidebar__link--active"
							th:href="@{/mypage/consultation}">상담 이력</a> <a
							class="ev-mypage-sidebar__link" th:href="@{/mypage/inquiry}">문의
							내역</a> <a class="ev-mypage-sidebar__link"
							th:href="@{/mypage/withdraw}">회원탈퇴</a> <a
							class="ev-mypage-sidebar__link" th:href="@{/logout}">로그아웃</a>
					</nav>
				</aside>

				<div class="ev-consultation-content">
					<div class="ev-consultation-header">
						<p class="ev-consultation-eyebrow">Consultation History</p>
						<h1 class="ev-consultation-title">상담 이력</h1>
						<p class="ev-consultation-description">상담 신청 내역을 확인하고 진행 상태에
							따라 취소할 수 있습니다.</p>
					</div>

					<div class="ev-consultation-list"
						th:if="${consultations != null and !#lists.isEmpty(consultations)}">
						<article class="ev-consultation-card"
							th:each="consultation : ${consultations}">
							<div class="ev-consultation-card__body">
								<div class="ev-consultation-card__row">
									<span class="ev-consultation-card__label">희망 상담일시</span> <span
										class="ev-consultation-card__value"
										th:text="${#temporals.format(consultation.preferredDatetime, 'yyyy-MM-dd HH:mm')}"></span>
								</div>

								<div class="ev-consultation-card__row">
									<span class="ev-consultation-card__label">예산</span> <span
										class="ev-consultation-card__value"
										th:text="${consultation.budget != null ? consultation.budget + '만원' : '-'}"></span>
								</div>

								<div class="ev-consultation-card__row">
									<span class="ev-consultation-card__label">구매 시기</span> <span
										class="ev-consultation-card__value"
										th:text="${consultation.purchasePlanLabel}"></span>
								</div>

								<div
									class="ev-consultation-card__row ev-consultation-card__row--full">
									<span class="ev-consultation-card__label">상담 내용</span> <span
										class="ev-consultation-card__value ev-consultation-card__value--multiline"
										th:text="${consultation.consultContent}"></span>
								</div>

								<div
									class="ev-consultation-card__row ev-consultation-card__row--full"
									th:if="${consultation.adminReply != null and !#strings.isEmpty(consultation.adminReply)}">
									<span class="ev-consultation-card__label">관리자 답변</span> <span
										class="ev-consultation-card__value ev-consultation-card__value--reply"
										th:text="${consultation.adminReply}"></span>
								</div>
							</div>

							<div class="ev-consultation-card__footer">
								<span class="ev-consultation-status"
									th:classappend="${consultation.consultStatus == 'COMPLETED'} ? ' ev-consultation-status--done'
                                                  : (${consultation.consultStatus == 'CANCELED'} ? ' ev-consultation-status--cancel'
                                                  : ' ev-consultation-status--progress')"
									th:text="${consultation.consultStatusLabel}"> </span>

								<form th:if="${consultation.cancelable}"
									th:action="@{/mypage/consultation/cancel}" method="post"
									class="ev-consultation-cancel-form">
									<input type="hidden" name="consultId"
										th:value="${consultation.consultId}">
									<button type="submit"
										class="btn btn-ev-secondary ev-consultation-cancel-btn">취소</button>
								</form>

								<span th:if="${!consultation.cancelable}"
									class="ev-consultation-disabled-text">취소불가</span>
							</div>
						</article>
					</div>

					<div class="ev-consultation-empty"
						th:if="${consultations == null or #lists.isEmpty(consultations)}">
						<div class="ev-consultation-empty__icon">📄</div>
						<h2 class="ev-consultation-empty__title">상담 이력이 없습니다</h2>
						<p class="ev-consultation-empty__text">신규 상담을 신청하면 이곳에서 확인할 수
							있습니다.</p>
						<a class="btn btn-ev-primary" th:href="@{/consultation/form}">상담
							신청하기</a>
					</div>
				</div>
			</div>
		</section>
	</main>

	<div th:replace="~{layout/footer :: footer}"></div>
	<div th:replace="~{fragments/chatbotWidget :: chatbot}"></div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script th:src="@{/js/mypage/myConsultation.js}"></script>
</body>
</html>
