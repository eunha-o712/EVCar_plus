<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="sidebar(activeMenu)">
    <aside class="ev-mypage-sidebar">
        <h2 class="ev-mypage-sidebar__title">마이페이지</h2>

        <nav class="ev-mypage-sidebar__nav">
            <a class="ev-mypage-sidebar__link"
               th:classappend="${activeMenu == 'main'} ? ' ev-mypage-sidebar__link--active' : ''"
               th:href="@{/mypage/main}">홈</a>

            <a class="ev-mypage-sidebar__link"
               th:classappend="${activeMenu == 'info'} ? ' ev-mypage-sidebar__link--active' : ''"
               th:href="@{/mypage/info}">내 정보</a>

            <a class="ev-mypage-sidebar__link"
               th:classappend="${activeMenu == 'wishlist'} ? ' ev-mypage-sidebar__link--active' : ''"
               th:href="@{/mypage/wishlist}">관심 차량</a>

            <a class="ev-mypage-sidebar__link"
               th:classappend="${activeMenu == 'consultation'} ? ' ev-mypage-sidebar__link--active' : ''"
               th:href="@{/mypage/consultation}">상담 이력</a>

            <a class="ev-mypage-sidebar__link"
               th:classappend="${activeMenu == 'inquiry'} ? ' ev-mypage-sidebar__link--active' : ''"
               th:href="@{/mypage/inquiry}">문의 내역</a>

            <a class="ev-mypage-sidebar__link"
               th:classappend="${activeMenu == 'withdraw'} ? ' ev-mypage-sidebar__link--active' : ''"
               th:href="@{/mypage/withdraw}">회원탈퇴</a>
        </nav>
    </aside>
</th:block>
</html>
