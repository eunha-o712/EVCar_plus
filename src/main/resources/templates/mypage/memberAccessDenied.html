<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이용 안내 - EVCar</title>
<link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/common/common.css}">
<link rel="stylesheet" th:href="@{/css/mypage/mypageLayout.css}">
<link rel="stylesheet" th:href="@{/css/mypage/mypageSidebar.css}">
<link rel="stylesheet" th:href="@{/css/mypage/memberAccessGuide.css}">
</head>
<body>
    <div th:replace="~{layout/header :: header}"></div>

    <main class="ev-mypage-page">
        <section class="ev-mypage-section">
            <div class="ev-mypage-container">
                <div th:replace="~{mypage/sidebar :: sidebar('main')}"></div>

                <div class="ev-mypage-content">
                    <div class="ev-mypage-header">
                        <div class="ev-mypage-header__text">
                            <h1 class="ev-mypage-title">이용 안내</h1>
                            <p class="ev-mypage-description"
                               th:text="${message != null ? message : '요청하신 페이지를 이용할 수 없습니다.'}">
                                요청하신 페이지를 이용할 수 없습니다.
                            </p>
                        </div>
                    </div>

                    <section class="ev-member-guide-card ev-mypage-card">
                        <div class="ev-member-guide-card__body">
                            <h2 class="ev-member-guide-card__title">확인이 필요합니다</h2>
                            <p class="ev-member-guide-card__text">
                                접근 권한 또는 이용 조건에 따라 요청하신 페이지를 바로 열 수 없습니다.
                                아래 메뉴로 이동해 다시 확인해주세요.
                            </p>

                            <div class="ev-member-guide-card__actions">
                                <a th:href="@{/mypage/main}" class="btn btn-ev-primary">마이페이지 홈</a>
                                <a th:href="@{/mypage/info}" class="btn btn-ev-secondary">내 정보로</a>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </section>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/common/footer.js}"></script>
</body>
</html>
