<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이용 안내 - EVCar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common/common.css}">
    <link rel="stylesheet" th:href="@{/css/mypage/myPageMain.css}">
</head>
<body>
<main class="ev-main">
    <section class="py-5">
        <div class="container">
            <div class="mx-auto" style="max-width: 640px;">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-5 text-center">
                        <h1 class="h3 mb-3">이용 안내</h1>
                        <p class="text-secondary mb-4"
                           th:text="${message != null ? message : '요청하신 페이지를 이용할 수 없습니다.'}">
                            요청하신 페이지를 이용할 수 없습니다.
                        </p>
                        <div class="d-flex justify-content-center gap-2">
                            <a th:href="@{/mypage/main}" class="btn btn-dark">마이페이지 홈</a>
                            <a th:href="@{/mypage/info}" class="btn btn-outline-secondary">내 정보로</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>
</body>
</html>
