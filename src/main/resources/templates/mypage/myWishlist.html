<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관심 차량 - EVCar</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common/common.css}">
    <link rel="stylesheet" th:href="@{/css/mypage/mypageSidebar.css}">
    <link rel="stylesheet" th:href="@{/css/mypage/mypageLayout.css}">
    <link rel="stylesheet" th:href="@{/css/mypage/myWishlist.css}">
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<main class="ev-mypage-page">
    <section class="ev-mypage-section">
        <div class="ev-mypage-container">
            <div th:replace="~{mypage/sidebar :: sidebar('wishlist')}"></div>

            <div class="ev-mypage-content">
                <div class="ev-mypage-header">
                    <div class="ev-mypage-header__text">
                        <h1 class="ev-mypage-title">관심 차량</h1>
                        <p class="ev-mypage-description">
                            관심 등록한 차량을 확인하고 상세보기 또는 삭제할 수 있습니다.
                        </p>
                    </div>
                </div>

                <div class="ev-wishlist-grid" id="wishlistGrid"></div>

                <div class="ev-wishlist-more ev-wishlist-more--hidden"
                     id="wishlistMoreWrap">
                    <button type="button"
                            class="btn btn-ev-secondary"
                            id="wishlistMoreButton">더보기</button>
                </div>

                <div class="ev-wishlist-empty ev-wishlist-empty--hidden ev-mypage-empty-card"
                     id="wishlistEmpty">
                    <div class="ev-wishlist-empty__icon">♡</div>
                    <h2 class="ev-wishlist-empty__title">관심 차량이 없습니다</h2>
                    <p class="ev-wishlist-empty__text">마음에 드는 전기차를 관심 차량으로 등록해보세요.</p>
                    <a class="btn btn-ev-primary" th:href="@{/vehicle/list}">차량 보러가기</a>
                </div>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{layout/footer :: footer}"></div>
<div th:replace="~{fragments/chatbotWidget :: chatbot}"></div>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/common/footer.js}"></script>
<script th:src="@{/js/mypage/myWishlist.js}"></script>
</body>
</html>
