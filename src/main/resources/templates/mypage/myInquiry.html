
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문의 내역 - EVCar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/common/common.css}">
<link rel="stylesheet" th:href="@{/css/mypage/mypageSidebar.css}">
<link rel="stylesheet" th:href="@{/css/mypage/mypageLayout.css}">
<link rel="stylesheet" th:href="@{/css/mypage/myInquiry.css}">
</head>

<body>

<div th:replace="~{layout/header :: header}"></div>

<main class="ev-mypage-page">
    <section class="ev-mypage-section">
        <div class="ev-mypage-container">

            <div th:replace="~{mypage/sidebar :: sidebar('inquiry')}"></div>

            <div class="ev-mypage-content">
                <div class="ev-mypage-header">
                    <div class="ev-mypage-header__text">
                        <h1 class="ev-mypage-title">문의 내역</h1>
                        <p class="ev-mypage-description">작성한 문의글과 답변 상태를 확인할 수 있습니다.</p>
                    </div>

                    <div class="ev-mypage-header__actions"
                         th:if="${inquiries != null and !#lists.isEmpty(inquiries)}">
                        <a class="btn btn-ev-primary ev-inquiry-write-btn"
   th:href="@{/inquiry}">
    문의게시판으로 이동
</a>
                    </div>
                </div>

                <div class="alert alert-success"
                     th:if="${message != null}"
                     th:text="${message}">
                </div>

                <div class="ev-inquiry-list"
                     th:if="${inquiries != null and !#lists.isEmpty(inquiries)}">

                    <article class="ev-inquiry-card" th:each="inquiry : ${inquiries}">
                        <div class="ev-inquiry-card__body">

                            <div class="ev-inquiry-card__row">
                                <span class="ev-inquiry-card__label">제목</span>
                                <span class="ev-inquiry-card__value" th:text="${inquiry.title}"></span>
                            </div>

                            <div class="ev-inquiry-card__row">
                                <span class="ev-inquiry-card__label">작성일</span>
                                <span class="ev-inquiry-card__value"
                                      th:text="${#temporals.format(inquiry.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                            </div>

                            <div class="ev-inquiry-card__row">
                                <span class="ev-inquiry-card__label">상태</span>
                                <span class="ev-inquiry-card__value"
                                      th:text="${inquiry.replyStatusLabel != null ? inquiry.replyStatusLabel : (inquiry.answered ? '답변 완료' : '답변 대기')}">
                                </span>
                            </div>

                            <div class="ev-inquiry-card__row ev-inquiry-card__row--full">
                                <span class="ev-inquiry-card__label">내용</span>
                                <span class="ev-inquiry-card__value ev-inquiry-card__value--multiline"
                                      th:text="${inquiry.content}">
                                </span>
                            </div>

                            <div class="ev-inquiry-card__row ev-inquiry-card__row--full"
                                 th:if="${inquiry.replyContent != null and !#strings.isEmpty(inquiry.replyContent)}">
                                <span class="ev-inquiry-card__label">관리자 답변</span>
                                <span class="ev-inquiry-card__value ev-inquiry-card__value--reply"
                                      th:text="${inquiry.replyContent}">
                                </span>
                            </div>

                            <div class="ev-inquiry-card__row"
                                 th:if="${inquiry.updatedAt != null and inquiry.replyContent != null}">
                                <span class="ev-inquiry-card__label">답변일</span>
                                <span class="ev-inquiry-card__value"
                                      th:text="${#temporals.format(inquiry.updatedAt, 'yyyy-MM-dd HH:mm')}">
                                </span>
                            </div>
                        </div>

                        <div class="ev-inquiry-card__footer">
                            <span class="ev-inquiry-status"
                                  th:classappend="${
                                      inquiry.replyStatus == 'REPLIED' ? ' ev-inquiry-status--done' :
                                      (inquiry.replyStatus == 'CLOSED' ? ' ev-inquiry-status--closed' :
                                      ' ev-inquiry-status--waiting')
                                  }"
                                  th:text="${inquiry.replyStatusLabel != null ? inquiry.replyStatusLabel : (inquiry.answered ? '답변 완료' : '답변 대기')}">
                            </span>

                            <div class="ev-inquiry-card__actions">
								<form method="post" th:action="@{/mypage/inquiry/cancel}">
								    <input type="hidden" name="inquiryId" th:value="${inquiry.inquiryId}">
								    
									<button type="submit"
									        class="btn btn-outline-danger btn-sm"
									        onclick="return confirm('문의 내용을 취소하시겠습니까?');">
									    취소
									</button>
								</form>

                                <a class="btn btn-ev-secondary"
                                   th:href="@{/mypage/inquiry/{id}(id=${inquiry.inquiryId})}">
                                    상세보기
                                </a>
                            </div>
                        </div>
                    </article>
                </div>

                <div class="ev-inquiry-empty ev-mypage-empty-card"
                     th:if="${inquiries == null or #lists.isEmpty(inquiries)}">
                    <div class="ev-inquiry-empty__icon">✉️</div>
                    <h2 class="ev-inquiry-empty__title">문의 내역이 없습니다</h2>
                    <p class="ev-inquiry-empty__text">문의게시판에서 문의를 작성하면 이곳에서 답변을 확인할 수 있습니다.</p>
               <a class="btn btn-ev-primary ev-inquiry-write-btn" th:href="@{/inquiry}">
    문의게시판으로 이동
</a>
                  
                </div>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{layout/footer :: footer}"></div>
<div th:replace="~{fragments/chatbotWidget :: chatbot}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/common/footer.js}"></script>
<script th:src="@{/js/mypage/myInquiry.js}"></script>

</body>
</html>
