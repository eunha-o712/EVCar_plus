<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의 내역 - EVCar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/mypage/myInquiry.css}">
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<main class="ev-inquiry-page">
    <section class="ev-inquiry-section">
        <div class="ev-inquiry-container">
            <aside class="ev-mypage-sidebar">
                <h2 class="ev-mypage-sidebar__title">마이페이지</h2>
                <nav class="ev-mypage-sidebar__nav">
                    <a class="ev-mypage-sidebar__link" th:href="@{/mypage/main}">마이페이지 홈</a>
                    <a class="ev-mypage-sidebar__link" th:href="@{/mypage/info}">내 정보</a>
                    <a class="ev-mypage-sidebar__link" th:href="@{/mypage/wishlist}">관심 차량</a>
                    <a class="ev-mypage-sidebar__link" th:href="@{/mypage/consultation}">상담 이력</a>
                    <a class="ev-mypage-sidebar__link ev-mypage-sidebar__link--active" th:href="@{/mypage/inquiry}">문의 내역</a>
                    <a class="ev-mypage-sidebar__link" th:href="@{/mypage/withdraw}">회원탈퇴</a>
                    <a class="ev-mypage-sidebar__link" th:href="@{/logout}">로그아웃</a>
                </nav>
            </aside>

            <div class="ev-inquiry-content">
                <div class="ev-inquiry-header">
                    <p class="ev-inquiry-eyebrow">Inquiry History</p>
                    <h1 class="ev-inquiry-title">문의 내역</h1>
                    <p class="ev-inquiry-description">작성한 문의글과 답변 여부를 확인할 수 있습니다.</p>
                </div>

                <div class="ev-inquiry-list" th:if="${inquiries != null and !#lists.isEmpty(inquiries)}">
                    <article class="ev-inquiry-card" th:each="inquiry : ${inquiries}">
                        <div class="ev-inquiry-card__body">
                            <div class="ev-inquiry-card__row">
                                <span class="ev-inquiry-card__label">제목</span>
                                <span class="ev-inquiry-card__value" th:text="${inquiry.title}">문의 제목</span>
                            </div>

                            <div class="ev-inquiry-card__row">
                                <span class="ev-inquiry-card__label">작성일</span>
                                <span class="ev-inquiry-card__value"
                                      th:text="${#temporals.format(inquiry.createdAt, 'yyyy-MM-dd HH:mm')}">
                                    2026-03-26 15:00
                                </span>
                            </div>

                            <div class="ev-inquiry-card__row ev-inquiry-card__row--full">
                                <span class="ev-inquiry-card__label">내용</span>
                                <span class="ev-inquiry-card__value" th:text="${inquiry.content}">문의 내용</span>
                            </div>

                            <div class="ev-inquiry-card__row ev-inquiry-card__row--full" th:if="${inquiry.answered}">
                                <span class="ev-inquiry-card__label">답변</span>
                                <span class="ev-inquiry-card__value" th:text="${inquiry.replyContent}">답변 내용</span>
                            </div>
                        </div>

                        <div class="ev-inquiry-card__footer">
                            <span class="ev-inquiry-status"
                                  th:classappend="${inquiry.answered} ? ' ev-inquiry-status--done' : ' ev-inquiry-status--waiting'"
                                  th:text="${inquiry.answered} ? '답변완료' : '답변대기'">
                                답변대기
                            </span>

                            <a class="btn btn-ev-secondary" th:href="@{/inquiry/{id}(id=${inquiry.inquiryId})}">
                                상세보기
                            </a>
                        </div>
                    </article>
                </div>

                <div class="ev-inquiry-empty" th:if="${inquiries == null or #lists.isEmpty(inquiries)}">
                    <div class="ev-inquiry-empty__icon">✉️</div>
                    <h2 class="ev-inquiry-empty__title">문의 내역이 없습니다</h2>
                    <p class="ev-inquiry-empty__text">궁금한 점이 있다면 문의를 작성해보세요.</p>
                    <a class="btn btn-ev-primary" th:href="@{/inquiry/form}">문의 작성하기</a>
                </div>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{layout/footer :: footer}"></div>
<div th:replace="~{fragments/chatbotWidget :: chatbot}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/mypage/myInquiry.js}"></script>
</body>
</html>
