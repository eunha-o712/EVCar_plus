<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>회원가입</title>

<!-- 카카오 주소 API -->
<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:"돋움", Dotum, sans-serif;
background:#f3f4f6;
}

.container{
max-width:850px;
width:90%;
margin:80px auto;
}

.title{
font-size:32px;
font-weight:bold;
margin-bottom:40px;
}

/* 입력 row */

.form-row{
display:flex;
align-items:center;
margin-bottom:15px;
}

.label{
width:160px;
}

.input-box{
flex:1;
}

/* input */

input{
width:100%;
height:40px;
padding:6px 10px;
border:1px solid #ccc;
border-radius:3px;
}

/* 아이디 영역 */

.id-area{
display:flex;
align-items:center;
gap:10px;
}

.id-area input{
flex:1;
}

/* 버튼 */

.check-btn{
height:40px;
padding:0 18px;
background:#3f6fb5;
color:white;
border:none;
cursor:pointer;
white-space:nowrap;
}

.address-btn{
height:40px;
padding:0 18px;
background:#3f6fb5;
color:white;
border:none;
cursor:pointer;
white-space:nowrap;
}

/* 성별 */

.gender-box{
display:flex;
gap:15px;
}

.gender-box input{
width:16px;
height:16px;
}

/* 이메일 */

.email-box{
display:flex;
gap:5px;
align-items:center;
}

/* 버튼 영역 */

.button-area{
margin-top:40px;
display:flex;
justify-content:center;
gap:20px;
}

.submit-btn{
padding:12px 40px;
background:#3f6fb5;
color:white;
border:none;
cursor:pointer;
}

.back-btn{
padding:12px 40px;
background:#6c757d;
color:white;
border:none;
cursor:pointer;
}

.note{
margin-top:20px;
color:red;
font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<div class="title">회원가입</div>

<form action="/signup" method="post">

<input type="hidden" name="agreePrivacy" value="true" />
<input type="hidden" name="agreeTerms" value="true" />
<input type="hidden" name="email" id="emailFull" />
<!-- 아이디 -->

<div class="form-row">
<div class="label">아이디(필수) *</div>

<div class="input-box id-area">

<input type="text" name="loginId" id="loginId" placeholder="영문/숫자 8~20자(필수)" />

<button type="button" class="check-btn" onclick="checkId()">중복확인</button>
<small id="idMsg"></small>

</div>
</div>

<!-- 비밀번호 -->

<div class="form-row">
<div class="label">비밀번호(필수) *</div>
<div class="input-box">
<input type="password" name="password" id="password" placeholder="영문/숫자 포함 8~20자(필수)" />


</div>
</div>

<!-- 비밀번호 확인 -->

<div class="form-row">
<div class="label">비밀번호 확인(필수) *</div>
<div class="input-box">
<input type="password" name="passwordConfirm" id="passwordConfirm" placeholder="비밀번호를 다시 입력해 주세요!" />
<small id="pwMsg"></small>
</div>
</div>

<!-- 이름 -->

<div class="form-row">
<div class="label">이름(필수) *</div>
<div class="input-box">
<input type="text" name="name" placeholder="한글/영문 포함 50자(필수)" />
</div>
</div>

<!-- 생년월일 -->

<div class="form-row">
<div class="label">생년월일(필수) *</div>
<div class="input-box">
<input type="text" id="birthDate" name="birthDate" maxlength="10" placeholder="YYYY-MM-DD" />
</div>
</div>

<!-- 성별 -->

<div class="form-row">
<div class="label">성별(필수) *</div>

<div class="gender-box">
<label><input type="radio" name="gender" value="남"> 남</label>
<label><input type="radio" name="gender" value="여"> 여</label>
</div>

</div>

<!-- 전화번호 -->

<div class="form-row">
<div class="label">전화번호(필수) *</div>
<div class="input-box">
<input name="phone" placeholder="숫자만 입력" />
</div>
</div>

<!-- 주소 -->

<div class="form-row">
<div class="label">주소(필수) *</div>

<div class="input-box id-area">

<input name="address" id="address" />

<button type="button" class="address-btn" onclick="searchAddress()">
주소검색
</button>

</div>

</div>

<!-- 상세주소 -->
<div class="form-row">
<div class="label">상세주소</div>

<div class="input-box">
<input name="addressDetail" placeholder="나머지 주소를 입력해 주세요" />
</div>

</div>

<!-- 이메일 -->

<div class="form-row">
<div class="label">이메일(필수) *</div>

<div class="input-box email-box">

<input type="text" id="emailId" />

<span>@</span>

<input type="text" id="emailDomain" />

<select id="domainSelect">
<option value="">직접입력</option>
<option value="naver.com">naver.com</option>
<option value="daum.net">daum.net</option>
<option value="gmail.com">gmail.com</option>
</select>

</div>

</div>

<!-- 차량 -->

<div class="form-row">
<div class="label">보유 차량명(선택)</div>
<div class="input-box">
<input name="vehicleModel" id="carName" />
</div>
</div>

<div class="form-row">
<div class="label">보유차종 연식</div>
<div class="input-box">
<input name="vehicleYear" id="carYear" />
</div>
</div>

<div class="form-row">
<div class="label">주행거리(Km)</div>
<div class="input-box">
<input name="drivingDistance" id="carMileage" />
</div>
</div>

<div class="button-area">

<button type="submit" class="submit-btn">
가입하기
</button>

<button type="button" class="back-btn" onclick="history.back()">
돌아가기
</button>

</div>

</form>

<div class="note">
* 는 필수 입력 항목입니다.
</div>

</div>

<script>

/* 비밀번호 확인 */

const pw=document.getElementById("password");
const pwConfirm=document.getElementById("passwordConfirm");
const msg=document.getElementById("pwMsg");

pwConfirm.addEventListener("keyup",function(){

if(pw.value===pwConfirm.value){
msg.textContent="비밀번호가 일치합니다.";
msg.style.color="green";
}else{
msg.textContent="비밀번호가 일치하지 않습니다.";
msg.style.color="red";
}

});

/* 카카오 주소 검색 */

function searchAddress(){

new daum.Postcode({

oncomplete:function(data){

document.getElementById("address").value = data.address;

}

}).open();

}

/* 이메일 선택 */

const domainSelect=document.getElementById("domainSelect");
const domainInput=document.getElementById("emailDomain");

domainSelect.addEventListener("change",function(){

if(this.value!==""){
domainInput.value=this.value;
domainInput.readOnly=true;
}else{
domainInput.value="";
domainInput.readOnly=false;
}

});

/* 이메일 합치기 */

document.querySelector("form").onsubmit = function(){

    const id = document.getElementById("emailId").value;
    const domain = document.getElementById("emailDomain").value;

    if(!id || !domain){
        alert("이메일을 입력해주세요.");
        return false;   // ❗ 이게 핵심 (submit 막는 방식 변경)
    }

    document.getElementById("emailFull").value = id + "@" + domain;

    return true;   // 정상 submit
};

/* 차량 활성화 */

const carName=document.getElementById("carName");
const carYear=document.getElementById("carYear");
const mileage=document.getElementById("carMileage");

carName.addEventListener("input", function () {
    const hasValue = this.value.trim() !== "";

    carYear.disabled = !hasValue;
    mileage.disabled = !hasValue;

    if (!hasValue) {
        carYear.value = "";
        mileage.value = "";
    }
});

async function checkId() {
    const loginId = document.getElementById("loginId").value;
    const msg = document.getElementById("idMsg");

    if (!loginId) {
        msg.textContent = "아이디를 입력하세요.";
        msg.style.color = "red";
        return;
    }

    const res = await fetch(`/signup/check-id?loginId=${loginId}`);
    const isDuplicate = await res.json();

    if (isDuplicate) {
        msg.textContent = "이미 사용중인 아이디입니다.";
        msg.style.color = "red";
    } else {
        msg.textContent = "사용 가능한 아이디입니다.";
        msg.style.color = "green";
    }
}


const birth = document.getElementById("birthDate");

birth.addEventListener("input", function () {
	let val = this.value.replace(/[^0-9]/g, "").slice(0, 8);

    if (val.length >= 5) val = val.slice(0, 4) + "-" + val.slice(4);
    if (val.length >= 8) val = val.slice(0, 7) + "-" + val.slice(7, 10);

    this.value = val;
});

</script>

</body>
</html>
