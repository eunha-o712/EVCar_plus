<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/common/common.css}">
    <link rel="stylesheet" th:href="@{/css/common/main.css}">
<head>
<meta charset="UTF-8">
<title>회원가입</title>


<!-- 카카오 주소 API -->
<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

<!-- 국가 번호 API -->
<script src="/js/country-code.js"></script>

<style>

body{
margin:0;
font-family:"돋움", Dotum, sans-serif;
background:#f3f4f6;
}

.container{
max-width:850px;
width:90%;
margin:80px auto;
}

.title{
font-size:32px;
font-weight:bold;
margin-bottom:40px;
}

/* 입력 row */

.form-row{
display:flex;
align-items:center;
margin-bottom:15px;
}

.label{
width:160px;
}

.input-box{
flex:1;
}

/* input */

input{
width:100%;
height:40px;
padding:6px 10px;
border:1px solid #ccc;
border-radius:3px;
}

/* 아이디 영역 */

.id-area{
display:flex;
align-items:center;
gap:10px;
}

.id-area input{
flex:1;
}

/* 버튼 */

.check-btn{
height:40px;
padding:0 18px;
background:#3f6fb5;
color:white;
border:none;
cursor:pointer;
white-space:nowrap;
}

.address-btn{
height:40px;
padding:0 18px;
background:#3f6fb5;
color:white;
border:none;
cursor:pointer;
white-space:nowrap;
}

/* 성별 */

.gender-box{
display:flex;
gap:15px;
}

.gender-box input{
width:16px;
height:16px;
}

/* 이메일 */

.email-box{
display:flex;
gap:5px;
align-items:center;
}

/* 버튼 영역 */

.button-area{
margin-top:40px;
display:flex;
justify-content:center;
gap:20px;
}

.submit-btn{
padding:12px 40px;
background:#3f6fb5;
color:white;
border:none;
cursor:pointer;
}

.back-btn{
padding:12px 40px;
background:#6c757d;
color:white;
border:none;
cursor:pointer;
}

.note{
margin-top:20px;
color:red;
font-size:13px;
}

</style>
	<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/common/common.css}">
    <link rel="stylesheet" th:href="@{/css/common/main.css}">
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<div class="container">

<div class="title">회원가입</div>

<form action="/signup" method="post">

<input type="hidden" name="agreePrivacy" value="true" />
<input type="hidden" name="agreeTerms" value="true" />
<input type="hidden" name="email" id="emailFull" />
<!-- 아이디 -->

<div class="form-row">
<div class="label">아이디(필수) *</div>

<div class="input-box id-area">

<input type="text" name="loginId" id="loginId" placeholder="영문/숫자 8~20자(필수)" />

<button type="button" class="check-btn" onclick="checkId()">중복확인</button>
<small id="idMsg"></small>

</div>
</div>

<!-- 비밀번호 -->

<div class="form-row">
<div class="label">비밀번호(필수) *</div>
<div class="input-box">
<input type="password" name="password" id="password" placeholder="영문/숫자 포함 8~20자(필수)" />


</div>
</div>

<!-- 비밀번호 확인 -->

<div class="form-row">
<div class="label">비밀번호 확인(필수) *</div>
<div class="input-box">
<input type="password" name="passwordConfirm" id="passwordConfirm" placeholder="비밀번호를 다시 입력해 주세요!" />
<small id="pwMsg"></small>
</div>
</div>

<!-- 이름 -->

<div class="form-row">
<div class="label">이름(필수) *</div>
<div class="input-box">
<input type="text" name="name" placeholder="한글/영문 포함 50자(필수)" />
</div>
</div>

<!-- 생년월일 -->
<div class="form-row">
<div class="label">생년월일(필수) *</div>

<div class="input-box" style="position:relative;">
    <input type="date" id="birthDate" name="birthDate" min="1900-01-01">
</div>
</div>

<!-- 성별 -->

<div class="form-row">
<div class="label">성별(필수) *</div>
<div class="gender-box">
<label><input type="radio" name="gender" value="남" required> 남</label>
<label><input type="radio" name="gender" value="여" required> 여</label>
</div>

</div>

<!-- 전화번호 -->

<div class="form-row">
<div class="label">전화번호(필수) *</div>

<div class="input-box" style="display:flex; gap:5px;">
<select id="countryCode" style="width:120px;"></select>
<input id="phone" placeholder="숫자만 입력 합니다." style="flex:1;" />
<input type="hidden" name="phone" id="fullPhone" />
</div>
</div>

<!-- 주소 -->

<div class="form-row">
<div class="label">주소(필수) *</div>
<div class="input-box id-area">
<input name="address" id="address" readonly/>
<button type="button" class="address-btn" onclick="searchAddress()">주소검색</button>
</div>
</div>

<!-- 상세주소 -->
<div class="form-row">
<div class="label">상세주소</div>
<div class="input-box">
<input name="addressDetail" placeholder="나머지 주소를 입력해 주세요" />
</div>
</div>

<!-- 이메일 -->

<div class="form-row">
<div class="label">이메일(필수) *</div>
<div class="input-box email-box">
<input type="text" id="emailId" />
<span>@</span>
<input type="text" id="emailDomain" />
<select id="domainSelect">
<option value="">직접입력</option>
<option value="naver.com">naver.com</option>
<option value="daum.net">daum.net</option>
<option value="gmail.com">gmail.com</option>
<option value="gmail.com">nate.com</option>
</select>

<button type="button" class="check-btn" onclick="checkEmail()">중복확인</button>
<small id="emailMsg"></small>

</div>

</div>

<!-- 차량 -->

<div class="form-row">
<div class="label">보유 차량명(선택)</div>
<div class="input-box">
<input name="vehicleModel" id="carName" placeholder="보유하신 차종을 입력하신 후 보유차종 연식, 주행거리(km)를 입력하세요" />
</div>
</div>

<div class="form-row">
<div class="label">보유차종 연식</div>
<div class="input-box">
<input type="text" name="vehicleYear" id="carYear" placeholder="YYYY-MM" disabled />

</div>
</div>

<div class="form-row">
<div class="label">주행거리(Km)</div>
<div class="input-box">
<input name="drivingDistance" id="carMileage" disabled />
</div>
</div>

<div class="button-area">

<button type="button" class="submit-btn">
가입하기
</button>

<button type="button" class="back-btn" onclick="history.back()">
돌아가기
</button>

</div>

</form>

<div class="note">
* 는 필수 입력 항목입니다.
</div>

</div>

<script>

let isIdChecked = false;
let isEmailChecked = false;

document.addEventListener('DOMContentLoaded', function() {

    const form = document.querySelector('form');

    document.getElementById('emailId').addEventListener('input', () => isEmailChecked = false);
    document.getElementById('emailDomain').addEventListener('input', () => isEmailChecked = false);

    document.querySelector('.submit-btn').addEventListener('click', function() {

        const form = document.querySelector('form');

        const loginId = document.getElementById('loginId').value.trim();
        const password = document.getElementById('password').value.trim();
        const passwordConfirm = document.getElementById('passwordConfirm').value.trim();
        const name = document.querySelector('input[name="name"]').value.trim();
        const birthDate = document.getElementById('birthDate').value.trim();
        const gender = document.querySelector('input[name="gender"]:checked');
        const phone = document.getElementById('phone').value.trim();
        const address = document.getElementById('address').value.trim();
        const emailId = document.getElementById('emailId').value.trim();
        const emailDomain = document.getElementById('emailDomain').value.trim();

        if (!loginId) return alert('아이디를 입력하세요.');
        if (!password) return alert('비밀번호를 입력하세요.');
        if (!passwordConfirm) return alert('비밀번호 확인을 입력하세요.');
        if (password !== passwordConfirm) return alert('비밀번호가 일치하지 않습니다.');
        if (!name) return alert('이름을 입력하세요.');
        if (!birthDate) return alert('생년월일을 입력하세요.');
        if (!gender) return alert('성별을 선택하세요.');
        if (!phone) return alert('전화번호를 입력하세요.');
        if (!address) return alert('주소를 입력하세요.');
        if (!emailId || !emailDomain) return alert('이메일을 입력하세요.');
        const email = emailId + '@' + emailDomain;
        const emailRegex = /^[^\s@]+@[^\s@]+\.[a-zA-Z]+(\.[a-zA-Z]+)*$/;

        if (!emailRegex.test(email)) {
            return alert('이메일 도메인을 올바르게 입력하세요.');
        }
        if (!isIdChecked) return alert('아이디 중복확인을 해주세요.');
        if (!isEmailChecked) return alert('이메일 중복확인을 해주세요.');

        document.getElementById('emailFull').value = emailId + '@' + emailDomain;
        document.getElementById('fullPhone').value =
            document.getElementById('countryCode').value + phone;

        form.submit();
    });

});
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {

/* 비밀번호 확인 */
const pw=document.getElementById("password");
const pwConfirm=document.getElementById("passwordConfirm");
const msg=document.getElementById("pwMsg");

pwConfirm.addEventListener("keyup",function(){
    if(pw.value===pwConfirm.value){
        msg.textContent="비밀번호가 일치합니다.";
        msg.style.color="green";
    }else{
        msg.textContent="비밀번호가 일치하지 않습니다.";
        msg.style.color="red";
    }
});


/* 전화번호 자동 하이픈 */
const phoneInput = document.getElementById("phone");
const countryCode = document.getElementById("countryCode");
const fullPhone = document.getElementById("fullPhone");

phoneInput.addEventListener("input", function () {

    let numbers = this.value.replace(/[^0-9]/g, "");

    if (numbers.length > 11) {
        numbers = numbers.substring(0, 11);
    }

    let formatted = "";

    if (numbers.length <= 3) {
        formatted = numbers;
    } else if (numbers.length <= 7) {
        formatted = numbers.slice(0, 3) + "-" + numbers.slice(3);
    } else {
        formatted =
            numbers.slice(0, 3) + "-" +
            numbers.slice(3, 7) + "-" +
            numbers.slice(7, 11);
    }

    this.value = formatted;

    fullPhone.value = countryCode.value + "-" + formatted;
});

/* 국가코드 변경 시 */
countryCode.addEventListener("change", function () {
    fullPhone.value = this.value + "-" + phoneInput.value;
});

/* 주소 */
window.searchAddress = function(){
    new daum.Postcode({
        oncomplete:function(data){
            document.getElementById("address").value = data.address;
        }
    }).open();
};

/* 이메일 선택 */
const domainSelect=document.getElementById("domainSelect");
const domainInput=document.getElementById("emailDomain");

domainSelect.addEventListener("change",function(){
    if(this.value!==""){
        domainInput.value=this.value;
        domainInput.readOnly=true;
    }else{
        domainInput.value="";
        domainInput.readOnly=false;
    }
});

/* 차량 활성화 */
const carName=document.getElementById("carName");
const carYear=document.getElementById("carYear");
const mileage=document.getElementById("carMileage");

carYear.disabled = true;
mileage.disabled = true;

carName.addEventListener("input", function () {
    const hasValue = this.value.trim() !== "";
    carYear.disabled = !hasValue;
    mileage.disabled = !hasValue;

    if (!hasValue) {
        carYear.value = "";
        mileage.value = "";
    }
});

}); 
</script>

//초기 상태 (페이지 로드 시)

/* 아이디 입력, 중복 체크 */
async function checkId() {
    const loginId = document.getElementById("loginId").value;
    const msg = document.getElementById("idMsg");

    if (!loginId) {
        msg.textContent = "아이디를 입력하세요.";
        msg.style.color = "red";
        return;
    }

    const res = await fetch(`/signup/check-id?loginId=${loginId}`);
    const text = await res.text();
    const isDuplicate = text.trim() === "true";

    if (isDuplicate) {
        msg.innerText = "이미 사용중인 아이디입니다.";
        msg.style.color = "red";
        isIdChecked = false;
    } else {
        msg.innerText = "사용 가능한 아이디입니다.";
        msg.style.color = "green";
        isIdChecked = true;
    }
}  

/* 생년월일 */
const birth = document.getElementById("birthDate");
const picker = document.getElementById("birthPicker");

birth.addEventListener("input", function () {

    let numbers = this.value.replace(/[^0-9]/g, "");

    if (numbers.length > 8) {
        numbers = numbers.substring(0, 8);
    }

    let result = "";

    if (numbers.length <= 4) {
        result = numbers;
    } else if (numbers.length <= 6) {
        result = numbers.slice(0, 4) + "-" + numbers.slice(4);
    } else {
        result =
            numbers.slice(0, 4) + "-" +
            numbers.slice(4, 6) + "-" +
            numbers.slice(6, 8);
    }

    this.value = result;

    if (result.length === 10) {
        picker.value = result;
    }
});

/* 이메일 중복 체크 */
async function checkEmail() {

    const id = document.getElementById("emailId").value;
    const domain = document.getElementById("emailDomain").value;
    const msg = document.getElementById("emailMsg");

    if (!id || !domain) {
        msg.innerText = "이메일을 입력하세요.";
        msg.style.color = "red";
        return;
    }

    const email = id + "@" + domain;

    const res = await fetch(`/signup/check-email?email=${encodeURIComponent(email)}`);
    const text = await res.text();
    const isDuplicate = text.trim() === "true";

    if (isDuplicate) {
        msg.innerText = "이미 사용중인 이메일입니다.";
        msg.style.color = "red";
        isEmailChecked = false;
    } else {
        msg.innerText = "사용 가능한 이메일입니다.";
        msg.style.color = "green";
        isEmailChecked = true;
    }
}
/* 차량 연식 YYYY-MM 포맷 */

const carYearInput = document.getElementById("carYear");

carYearInput.addEventListener("input", function () {

    let numbers = this.value.replace(/[^0-9]/g, "");

    if (numbers.length > 6) {
        numbers = numbers.substring(0, 6);
    }

    let result = "";

    if (numbers.length <= 4) {
        result = numbers;
    } else {
        result = numbers.slice(0, 4) + "-" + numbers.slice(4, 6);
    }

    this.value = result;
});
</script>
