<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ 관리 - EVCar Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin-common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin-faq.css}">
</head>

<body>
    <div class="ev-admin-app">
        <div class="ev-admin-layout">
            <div th:replace="~{layout/adminSidebar :: adminSidebar('faq')}"></div>

            <main class="ev-admin-main">
                <div class="ev-admin-shell">
                    <header class="ev-admin-page-header">
                        <div class="ev-admin-page-header__breadcrumb">관리자 &gt; FAQ관리</div>
                        <h1 class="ev-admin-page-header__title">FAQ 관리</h1>
                        <p class="ev-admin-page-header__desc">
                            자주 묻는 질문을 등록하고 수정할 수 있습니다.
                        </p>
                    </header>

                    <section class="ev-admin-card">
                        <div class="ev-admin-card__body">
                            <div class="ev-admin-toolbar">
                                <div class="ev-admin-toolbar__row"></div>

                                <div class="ev-admin-toolbar__row">
                                    <a th:href="@{/admin/faq/form}" class="ev-admin-btn ev-admin-btn--primary">
                                        FAQ 등록
                                    </a>
                                </div>
                            </div>

                            <div class="ev-admin-table-wrap"
                                th:if="${faqPage != null and !#lists.isEmpty(faqPage.faqList)}">
                                <table class="ev-admin-table ev-admin-faq-table">
                                    <thead>
                                        <tr>
                                            <th>No</th>
                                            <th>질문</th>
                                            <th>등록일</th>
                                            <th>수정일</th>
                                            <th>관리</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="faq : ${faqPage.faqList}">
                                            <td th:text="${faq.no}">10</td>
                                            <td>
                                                <div class="ev-admin-faq-question" th:text="${faq.question}">
                                                    전기차 배터리 화재 위험은 없나요?
                                                </div>
                                            </td>
                                            <td th:text="${faq.createdAt}">2026-03-31</td>
                                            <td th:text="${faq.updatedAt != null ? faq.updatedAt : '-'}">2026-03-31</td>
                                            <td>
                                                <div class="ev-admin-faq-actions">
                                                    <a th:href="@{/admin/faq/{id}/form(id=${faq.faqId})}"
                                                        class="ev-admin-btn ev-admin-btn--secondary ev-admin-btn--sm">
                                                        수정
                                                    </a>
                                                    <form th:action="@{/admin/faq/{id}/delete(id=${faq.faqId})}"
                                                        method="post">
                                                        <input type="hidden" name="page"
                                                            th:value="${faqPage.currentPage}">
                                                        <button type="submit"
                                                            class="ev-admin-btn ev-admin-btn--danger ev-admin-btn--sm">
                                                            삭제
                                                        </button>
                                                    </form>
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            <div class="ev-admin-empty" th:if="${faqPage == null or #lists.isEmpty(faqPage.faqList)}">
                                등록된 FAQ가 없습니다.
                            </div>

                            <nav class="ev-admin-pagination" th:if="${faqPage != null and faqPage.totalPages > 0}">
                                <a class="ev-admin-pagination__link ev-admin-pagination__link--arrow"
                                    th:classappend="${!faqPage.hasPreviousGroup} ? ' is-disabled'"
                                    th:href="${faqPage.hasPreviousGroup} ? @{/admin/faq(page=${faqPage.startPage - 1})} : '#'">
                                    &lt;
                                </a>

                                <th:block
                                    th:each="pageNumber : ${#numbers.sequence(faqPage.startPage, faqPage.endPage)}">
                                    <a class="ev-admin-pagination__link"
                                        th:classappend="${pageNumber == faqPage.currentPage} ? ' is-active'"
                                        th:text="${pageNumber}" th:href="@{/admin/faq(page=${pageNumber})}">
                                        1
                                    </a>
                                </th:block>

                                <a class="ev-admin-pagination__link ev-admin-pagination__link--arrow"
                                    th:classappend="${!faqPage.hasNextGroup} ? ' is-disabled'"
                                    th:href="${faqPage.hasNextGroup} ? @{/admin/faq(page=${faqPage.endPage + 1})} : '#'">
                                    &gt;
                                </a>
                            </nav>
                        </div>
                    </section>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin/admin-faq.js}"></script>
</body>

</html>>
