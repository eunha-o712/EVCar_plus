<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의게시판관리 - EVCar Admin</title>

    <link rel="stylesheet" th:href="@{/css/common/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin-common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/inquiry/list.css}">
</head>
<body>
<div class="ev-admin-app">
    <div class="ev-admin-layout">
        <div th:replace="~{layout/adminSidebar :: adminSidebar('inquiry')}"></div>

        <main class="ev-admin-main">
            <div class="ev-admin-shell">
                <header class="ev-admin-page-header">
                    <div class="ev-admin-page-header__breadcrumb">관리자 &gt; 문의게시판관리</div>
                    <h1 class="ev-admin-page-header__title">문의게시판 관리</h1>
                    <p class="ev-admin-page-header__desc">문의 목록 조회, 상세 확인, 답변 등록/수정을 관리합니다.</p>
                </header>

                <div class="ev-admin-alert" th:if="${message}" th:text="${message}"></div>

                <section class="ev-admin-card ev-inquiry-search-card">
                    <div class="ev-admin-card__body">
                        <form class="ev-inquiry-search-form" method="get" th:action="@{/admin/inquiry}">
                            <input type="hidden" name="size" th:value="${size}">

                            <div class="ev-inquiry-filter-group">
                                <a class="ev-inquiry-filter-button"
                                   th:classappend="${replyStatus == ''} ? ' is-active'"
                                   th:href="@{/admin/inquiry(page=1,size=${size},keyword=${keyword})}">
                                    전체
                                </a>
                                <a class="ev-inquiry-filter-button"
                                   th:classappend="${replyStatus == 'WAITING'} ? ' is-active'"
                                   th:href="@{/admin/inquiry(page=1,size=${size},replyStatus='WAITING',keyword=${keyword})}">
                                    대기
                                </a>
                                <a class="ev-inquiry-filter-button"
                                   th:classappend="${replyStatus == 'COMPLETED'} ? ' is-active'"
                                   th:href="@{/admin/inquiry(page=1,size=${size},replyStatus='COMPLETED',keyword=${keyword})}">
                                    완료
                                </a>
                            </div>

                            <div class="ev-inquiry-search-box">
                                <input type="text"
                                       name="keyword"
                                       class="ev-inquiry-search-input"
                                       placeholder="제목 / 내용 / 작성자 / 회원ID 검색"
                                       th:value="${keyword}">
                                <button type="submit" class="ev-inquiry-search-submit">검색</button>
                            </div>
                        </form>
                    </div>
                </section>

                <section class="ev-inquiry-content">
                    <div class="ev-admin-card ev-inquiry-list-card">
                        <div class="ev-admin-card__body">
                            <div class="ev-inquiry-list-header">
                                <strong>문의 목록</strong>
                                <span th:text="|총 ${pageResponse.totalCount}건|"></span>
                            </div>

                            <div class="ev-inquiry-table-wrap">
                                <table class="ev-table ev-inquiry-table">
                                    <thead>
                                    <tr>
                                        <th>No</th>
                                        <th>문의번호</th>
                                        <th>작성자</th>
                                        <th>제목</th>
                                        <th>등록일</th>
                                        <th>답변상태</th>
                                        <th>관리</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:if="${#lists.isEmpty(pageResponse.inquiries)}">
                                        <td colspan="7" class="ev-inquiry-empty">등록된 문의가 없습니다.</td>
                                    </tr>
                                    <tr th:each="item, stat : ${pageResponse.inquiries}"
                                        th:classappend="${selectedId == item.inquiryId} ? ' is-selected'">
                                        <td th:text="${(pageResponse.currentPage - 1) * pageResponse.pageSize + stat.index + 1}"></td>
                                        <td th:text="${item.inquiryId}"></td>
                                        <td>
                                            <div class="ev-inquiry-user-name" th:text="${item.userName}"></div>
                                            <div class="ev-inquiry-user-id" th:text="${item.userId}"></div>
                                        </td>
                                        <td class="ev-inquiry-title-cell" th:text="${item.title}"></td>
                                        <td th:text="${item.createdAt}"></td>
                                        <td>
                                            <span class="ev-inquiry-status"
                                                  th:classappend="${item.replyStatus == 'COMPLETED'} ? ' is-completed' : ' is-waiting'"
                                                  th:text="${item.replyStatus == 'COMPLETED' ? '완료' : '대기'}"></span>
                                        </td>
                                        <td>
                                            <a class="ev-inquiry-detail-link"
                                               th:href="@{/admin/inquiry/{id}(id=${item.inquiryId},page=${pageResponse.currentPage},size=${size},replyStatus=${replyStatus},keyword=${keyword})}">
                                                상세
                                            </a>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>

                            <nav class="ev-inquiry-pagination" th:if="${pageResponse.totalCount > 0}">
                                <a class="ev-inquiry-page-link"
                                   th:classappend="${!pageResponse.hasPreviousGroup} ? ' is-disabled'"
                                   th:href="${pageResponse.hasPreviousGroup} ? @{/admin/inquiry(page=${pageResponse.previousGroupPage},size=${size},replyStatus=${replyStatus},keyword=${keyword},selectedId=${selectedId})} : '#'">
                                    &lt;
                                </a>

                                <th:block th:each="pageNumber : ${#numbers.sequence(pageResponse.startPage, pageResponse.endPage)}">
                                    <a class="ev-inquiry-page-link"
                                       th:classappend="${pageResponse.currentPage == pageNumber} ? ' is-active'"
                                       th:text="${pageNumber}"
                                       th:href="@{/admin/inquiry(page=${pageNumber},size=${size},replyStatus=${replyStatus},keyword=${keyword},selectedId=${selectedId})}">
                                    </a>
                                </th:block>

                                <a class="ev-inquiry-page-link"
                                   th:classappend="${!pageResponse.hasNextGroup} ? ' is-disabled'"
                                   th:href="${pageResponse.hasNextGroup} ? @{/admin/inquiry(page=${pageResponse.nextGroupPage},size=${size},replyStatus=${replyStatus},keyword=${keyword},selectedId=${selectedId})} : '#'">
                                    &gt;
                                </a>
                            </nav>
                        </div>
                    </div>

                    <div class="ev-admin-card ev-inquiry-detail-card">
                        <div class="ev-admin-card__body" th:if="${detail != null}">
                            <div class="ev-inquiry-detail-header">
                                <div>
                                    <h2 class="ev-inquiry-detail-title">문의 상세 / 답변 작성</h2>
                                    <p class="ev-inquiry-detail-subtitle">선택한 문의에 대한 답변을 등록하거나 수정할 수 있습니다.</p>
                                </div>
                                <span class="ev-inquiry-status"
                                      th:classappend="${detail.replyStatus == 'COMPLETED'} ? ' is-completed' : ' is-waiting'"
                                      th:text="${detail.replyStatus == 'COMPLETED' ? '완료' : '대기'}"></span>
                            </div>

                            <div class="ev-inquiry-detail-meta">
                                <div><strong>문의번호 :</strong> <span th:text="${detail.inquiryId}"></span></div>
                                <div><strong>작성자 :</strong> <span th:text="${detail.userName}"></span> (<span th:text="${detail.userId}"></span>)</div>
                                <div><strong>전화번호 :</strong> <span th:text="${detail.phone}"></span></div>
                                <div><strong>이메일 :</strong> <span th:text="${detail.email}"></span></div>
                                <div><strong>등록일 :</strong> <span th:text="${detail.createdAt}"></span></div>
                                <div><strong>수정일 :</strong> <span th:text="${detail.updatedAt != null ? detail.updatedAt : '-'}"></span></div>
                            </div>

                            <div class="ev-inquiry-detail-section">
                                <h3>제목</h3>
                                <div class="ev-inquiry-detail-box" th:text="${detail.title}"></div>
                            </div>

                            <div class="ev-inquiry-detail-section">
                                <h3>내용</h3>
                                <div class="ev-inquiry-detail-box ev-inquiry-detail-box--content" th:text="${detail.content}"></div>
                            </div>

                            <div class="ev-inquiry-detail-section">
                                <h3>관리자 답변</h3>
                                <form method="post"
                                      th:action="@{/admin/inquiry/{id}/reply(id=${detail.inquiryId},page=${pageResponse.currentPage},size=${size},replyStatus=${replyStatus},keyword=${keyword})}">
                                    <textarea
                                            name="replyContent"
                                            class="ev-inquiry-reply-textarea"
                                            placeholder="답변 내용을 입력하세요."
                                            th:text="${detail.replyContent}"></textarea>

                                    <div class="ev-inquiry-form-actions">
                                        <button type="submit" class="ev-inquiry-primary-button">답변 저장</button>
                                        <a class="ev-inquiry-secondary-button"
                                           th:href="@{/admin/inquiry(page=${pageResponse.currentPage},size=${size},replyStatus=${replyStatus},keyword=${keyword})}">
                                            선택 해제
                                        </a>
                                    </div>
                                </form>
                            </div>
                        </div>

                        <div class="ev-admin-card__body" th:if="${detail == null}">
                            <div class="ev-inquiry-empty-detail">
                                좌측 목록에서 문의를 선택하면 상세 내용이 표시됩니다.
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
</div>

<script th:src="@{/js/common/common.js}"></script>
<script th:src="@{/js/admin/inquiry/list.js}"></script>
</body>
</html>
