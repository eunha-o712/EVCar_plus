<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상담관리 - EVCar Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin-common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin-consultation.css}">
</head>

<body>
<div class="ev-admin-app">
    <div class="ev-admin-layout">
        <div th:replace="~{layout/adminSidebar :: adminSidebar('consultation')}"></div>

        <main class="ev-admin-main">
            <div class="ev-admin-shell">
                <header class="ev-admin-page-header">
                    <div class="ev-admin-page-header__breadcrumb">관리자 &gt; 상담관리</div>
                    <h1 class="ev-admin-page-header__title">상담 관리</h1>
                    <p class="ev-admin-page-header__desc">
                        상담 목록 확인, 상태 변경, 관리자 답변 등록이 가능합니다.
                    </p>
                </header>

                <div class="ev-admin-grid ev-admin-consultation-grid">
                    <section class="ev-admin-card">
                        <div class="ev-admin-card__body">
                            <form th:action="@{/admin/consultation}" method="get" class="ev-admin-toolbar">
                                <div class="ev-admin-toolbar__row ev-admin-filter-group">
                                    <a class="ev-admin-chip"
                                       th:classappend="${selectedStatus == null || selectedStatus == '' || selectedStatus == 'ALL'} ? ' is-active'"
                                       th:href="@{/admin/consultation(keyword=${keyword}, page=1)}">
                                        전체
                                    </a>
                                    <a class="ev-admin-chip"
                                       th:classappend="${selectedStatus == 'PENDING'} ? ' is-active'"
                                       th:href="@{/admin/consultation(status='PENDING', keyword=${keyword}, page=1)}">
                                        대기
                                    </a>
                                    <a class="ev-admin-chip"
                                       th:classappend="${selectedStatus == 'IN_PROGRESS'} ? ' is-active'"
                                       th:href="@{/admin/consultation(status='IN_PROGRESS', keyword=${keyword}, page=1)}">
                                        진행중
                                    </a>
                                    <a class="ev-admin-chip"
                                       th:classappend="${selectedStatus == 'COMPLETED'} ? ' is-active'"
                                       th:href="@{/admin/consultation(status='COMPLETED', keyword=${keyword}, page=1)}">
                                        완료
                                    </a>
                                </div>

                                <div class="ev-admin-toolbar__row">
                                    <input type="text"
                                           name="keyword"
                                           class="ev-admin-input ev-admin-consultation-search"
                                           placeholder="회원명 또는 차량명 검색"
                                           th:value="${keyword}">
                                    <input type="hidden" name="status" th:value="${selectedStatus}">
                                    <button type="submit" class="ev-admin-btn ev-admin-btn--primary">검색</button>
                                </div>
                            </form>

                            <div class="ev-admin-table-wrap"
                                 th:if="${consultationList != null and !#lists.isEmpty(consultationList)}">
                                <table class="ev-admin-table">
                                    <thead>
                                    <tr>
                                        <th>No</th>
                                        <th>회원명</th>
                                        <th>희망차량</th>
                                        <th>희망일시</th>
                                        <th>상태</th>
                                        <th>관리</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="consultation, stat : ${consultationList}">
                                        <td th:text="${(currentPage - 1) * 10 + stat.count}">1</td>
                                        <td th:text="${consultation.userName}">홍길동</td>
                                        <td th:text="${consultation.vehicleModelNameLabel}">아이오닉 5</td>
                                        <td th:text="${consultation.consultationDateTime}">2026-03-20 14:00</td>
                                        <td th:switch="${consultation != null ? consultation.consultStatus : ''}">
                                            <span class="ev-admin-badge ev-admin-badge--pending" th:case="'PENDING'">대기</span>
                                            <span class="ev-admin-badge ev-admin-badge--progress" th:case="'IN_PROGRESS'">진행중</span>
                                            <span class="ev-admin-badge ev-admin-badge--complete" th:case="'COMPLETED'">완료</span>
                                            <span th:case="*">-</span>
                                        </td>
                                        <td>
                                            <a th:href="@{/admin/consultation(status=${selectedStatus}, keyword=${keyword}, page=${currentPage}, consultId=${consultation.consultId})}"
                                               class="ev-admin-btn ev-admin-btn--secondary ev-admin-btn--sm">
                                                상세
                                            </a>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>

                            <div class="ev-admin-empty"
                                 th:if="${consultationList == null or #lists.isEmpty(consultationList)}">
                                조회된 상담 데이터가 없습니다.
                            </div>

                            <nav class="ev-admin-pagination" th:if="${totalPages != null and totalPages > 0}">
                                <th:block th:with="
                                    startPage=${((currentPage - 1) / 10) * 10 + 1},
                                    endPage=${T(java.lang.Math).min(startPage + 9, totalPages)}
                                ">
                                    <a class="ev-admin-pagination__link ev-admin-pagination__link--arrow"
                                       th:classappend="${startPage == 1} ? ' is-disabled'"
                                       th:href="${startPage == 1} ? '#' : @{/admin/consultation(
                                            status=${selectedStatus},
                                            keyword=${keyword},
                                            page=${startPage - 1},
                                            consultId=${selectedConsultation != null ? selectedConsultation.consultId : null}
                                       )}">
                                        &lt;
                                    </a>

                                    <th:block th:each="pageNumber : ${#numbers.sequence(startPage, endPage)}">
                                        <a class="ev-admin-pagination__link"
                                           th:classappend="${pageNumber == currentPage} ? ' is-active'"
                                           th:text="${pageNumber}"
                                           th:href="@{/admin/consultation(
                                                status=${selectedStatus},
                                                keyword=${keyword},
                                                page=${pageNumber},
                                                consultId=${selectedConsultation != null ? selectedConsultation.consultId : null}
                                           )}">
                                            1
                                        </a>
                                    </th:block>

                                    <a class="ev-admin-pagination__link ev-admin-pagination__link--arrow"
                                       th:classappend="${endPage == totalPages} ? ' is-disabled'"
                                       th:href="${endPage == totalPages} ? '#' : @{/admin/consultation(
                                            status=${selectedStatus},
                                            keyword=${keyword},
                                            page=${endPage + 1},
                                            consultId=${selectedConsultation != null ? selectedConsultation.consultId : null}
                                       )}">
                                        &gt;
                                    </a>
                                </th:block>
                            </nav>
                        </div>
                    </section>

                    <aside class="ev-admin-card">
                        <div class="ev-admin-card__body">
                            <h2 class="ev-admin-section-title">상담 상세 / 답변 작성</h2>

                            <div th:if="${selectedConsultation != null}">
                                <dl class="ev-admin-detail-list">
                                    <div class="ev-admin-detail-item">
                                        <dt>회원명</dt>
                                        <dd th:text="${selectedConsultation.userName}">홍길동</dd>
                                    </div>
                                    <div class="ev-admin-detail-item">
                                        <dt>차량명</dt>
                                        <dd th:text="${selectedConsultation.vehicleModelNameLabel}">아이오닉 5</dd>
                                    </div>
                                    <div class="ev-admin-detail-item">
                                        <dt>희망일시</dt>
                                        <dd th:text="${selectedConsultation.preferredDatetime}">2026-03-20 14:00</dd>
                                    </div>
                                    <div class="ev-admin-detail-item">
                                        <dt>예산</dt>
                                        <dd th:text="${selectedConsultation.budget}">5000</dd>
                                    </div>
                                    <div class="ev-admin-detail-item">
                                        <dt>구매시기</dt>
                                        <dd th:text="${selectedConsultation.purchasePlan}">3개월 이내</dd>
                                    </div>
                                    <div class="ev-admin-detail-item">
                                        <dt>상담내용</dt>
                                        <dd th:text="${selectedConsultation.consultationContent}">상담 내용</dd>
                                    </div>
                                </dl>

                                <div class="ev-admin-divider"></div>

                                <form th:action="@{/admin/consultation/{id}/reply(id=${selectedConsultation.consultId})}"
                                      method="post">
                                    <input type="hidden" name="status" th:value="${selectedStatus}">
                                    <input type="hidden" name="keyword" th:value="${keyword}">
                                    <input type="hidden" name="page" th:value="${currentPage}">

                                    <div class="ev-admin-form-grid">
                                        <div class="ev-admin-form-field">
                                            <label for="consultStatus" class="ev-admin-form-label">상담상태 변경</label>
                                            <select id="consultStatus" name="consultStatus" class="ev-admin-select">
                                                <option value="">선택</option>
                                                <option value="PENDING"
                                                        th:selected="${selectedConsultation.consultStatus == 'PENDING'}">
                                                    대기
                                                </option>
                                                <option value="IN_PROGRESS"
                                                        th:selected="${selectedConsultation.consultStatus == 'IN_PROGRESS'}">
                                                    진행중
                                                </option>
                                                <option value="COMPLETED"
                                                        th:selected="${selectedConsultation.consultStatus == 'COMPLETED'}">
                                                    완료
                                                </option>
                                            </select>
                                        </div>

                                        <div class="ev-admin-form-field">
                                            <label for="consultResult" class="ev-admin-form-label">상담결과</label>
                                            <select id="consultResult" name="consultResult" class="ev-admin-select">
                                                <option value="">선택</option>
                                                <option value="CONTRACT"
                                                        th:selected="${selectedConsultation.consultResult == 'CONTRACT'}">
                                                    계약
                                                </option>
                                                <option value="HOLD"
                                                        th:selected="${selectedConsultation.consultResult == 'HOLD'}">
                                                    보류
                                                </option>
                                                <option value="REJECT"
                                                        th:selected="${selectedConsultation.consultResult == 'REJECT'}">
                                                    거절
                                                </option>
                                            </select>
                                        </div>

                                        <div class="ev-admin-form-field">
                                            <label for="adminReply" class="ev-admin-form-label">관리자 답변</label>
                                            <textarea id="adminReply"
                                                      name="adminReply"
                                                      class="ev-admin-textarea"
                                                      placeholder="답변 내용을 입력하세요."
                                                      th:text="${selectedConsultation.adminReply}"></textarea>
                                        </div>
                                    </div>

                                    <div class="ev-admin-actions">
                                        <button type="submit" class="ev-admin-btn ev-admin-btn--primary">저장</button>
                                        <a th:href="@{/admin/consultation(status=${selectedStatus}, keyword=${keyword}, page=${currentPage})}"
                                           class="ev-admin-btn ev-admin-btn--secondary">초기화</a>
                                    </div>
                                </form>
                            </div>

                            <div class="ev-admin-empty ev-admin-consultation-detail-empty"
                                 th:if="${selectedConsultation == null}">
                                좌측 목록에서 상담을 선택하면 상태 변경 및 답변 입력이 가능합니다.
                            </div>
                        </div>
                    </aside>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin/admin-consultation.js}"></script>
</body>

</html>
