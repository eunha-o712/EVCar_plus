<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상담관리 - EVCar Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin-common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin-consultation.css}">
</head>
<body>
<div class="ev-admin-app">
    <div class="ev-admin-layout">
        <div th:replace="~{layout/adminSidebar :: adminSidebar('consultation')}"></div>

        <main class="ev-admin-main">
            <div class="ev-admin-shell">
                <header class="ev-admin-page-header">
                    <div class="ev-admin-page-header__breadcrumb">관리자 &gt; 상담관리</div>
                    <h1 class="ev-admin-page-header__title">상담 관리</h1>
                    <p class="ev-admin-page-header__desc">
                        좌측 목록 + 우측 상세/답변 패널 구조로 분리한 뼈대입니다.
                    </p>
                </header>

                <div class="ev-admin-grid ev-admin-consultation-grid">
                    <section class="ev-admin-card">
                        <div class="ev-admin-card__body">
                            <div class="ev-admin-toolbar">
                                <div class="ev-admin-toolbar__row">
                                    <div class="ev-admin-filter-group">
                                        <button type="button" class="ev-admin-chip is-active">전체</button>
                                        <button type="button" class="ev-admin-chip">대기</button>
                                        <button type="button" class="ev-admin-chip">진행중</button>
                                        <button type="button" class="ev-admin-chip">완료</button>
                                    </div>
                                </div>
                                <div class="ev-admin-toolbar__row">
                                    <input type="text"
                                           class="ev-admin-input ev-admin-consultation-search"
                                           placeholder="회원명 또는 차량명 검색"
                                           aria-label="회원명 또는 차량명 검색">
                                </div>
                            </div>

                            <div class="ev-admin-table-wrap" th:if="${consultationList != null and !#lists.isEmpty(consultationList)}">
                                <table class="ev-admin-table">
                                    <thead>
                                    <tr>
                                        <th>No</th>
                                        <th>회원명</th>
                                        <th>희망차량</th>
                                        <th>희망일시</th>
                                        <th>상태</th>
                                        <th>관리</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="consultation, stat : ${consultationList}">
                                        <td th:text="${stat.count}">1</td>
                                        <td th:text="${consultation.userName}">홍길동</td>
                                        <td th:text="${consultation.vehicleModelName}">아이오닉 5</td>
                                        <td th:text="${consultation.consultationDateTime}">2026-03-20 14:00</td>
                                        <td>
                                            <span class="ev-admin-badge"
                                                  th:classappend="${
                                                    consultation.consultStatus == 'PENDING' ? ' ev-admin-badge--pending' :
                                                    consultation.consultStatus == 'IN_PROGRESS' ? ' ev-admin-badge--progress' :
                                                    ' ev-admin-badge--complete'
                                                  }"
                                                  th:text="${
                                                    consultation.consultStatus == 'PENDING' ? '대기' :
                                                    consultation.consultStatus == 'IN_PROGRESS' ? '진행중' :
                                                    '완료'
                                                  }">
                                                대기
                                            </span>
                                        </td>
                                        <td>
                                            <button type="button" class="ev-admin-btn ev-admin-btn--secondary ev-admin-btn--sm">
                                                상세
                                            </button>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>

                            <div class="ev-admin-empty" th:if="${consultationList == null or #lists.isEmpty(consultationList)}">
                                조회된 상담 데이터가 없습니다.
                            </div>
                        </div>
                    </section>

                    <aside class="ev-admin-card">
                        <div class="ev-admin-card__body">
                            <h2 class="ev-admin-section-title">상담 상세 / 답변 작성</h2>

                            <div th:if="${selectedConsultation != null}">
                                <dl class="ev-admin-detail-list">
                                    <div class="ev-admin-detail-item">
                                        <dt>회원명</dt>
                                        <dd th:text="${selectedConsultation.userName}">홍길동</dd>
                                    </div>
                                    <div class="ev-admin-detail-item">
                                        <dt>차량명</dt>
                                        <dd th:text="${selectedConsultation.vehicleModelName}">아이오닉 5</dd>
                                    </div>
                                    <div class="ev-admin-detail-item">
                                        <dt>예산</dt>
                                        <dd th:text="${selectedConsultation.budget}">5000</dd>
                                    </div>
                                    <div class="ev-admin-detail-item">
                                        <dt>구매시기</dt>
                                        <dd th:text="${selectedConsultation.purchasePlan}">3개월 이내</dd>
                                    </div>
                                    <div class="ev-admin-detail-item">
                                        <dt>상담내용</dt>
                                        <dd th:text="${selectedConsultation.consultationContent}">
                                            상담 내용이 표시됩니다.
                                        </dd>
                                    </div>
                                </dl>

                                <div class="ev-admin-divider"></div>

                                <div class="ev-admin-form-grid">
                                    <div class="ev-admin-form-field">
                                        <label for="consultStatus" class="ev-admin-form-label">상담상태 변경</label>
                                        <select id="consultStatus" class="ev-admin-select">
                                            <option value="">선택</option>
                                            <option value="PENDING">대기</option>
                                            <option value="IN_PROGRESS">진행중</option>
                                            <option value="COMPLETED">완료</option>
                                        </select>
                                    </div>

                                    <div class="ev-admin-form-field">
                                        <label for="consultResult" class="ev-admin-form-label">상담결과</label>
                                        <select id="consultResult" class="ev-admin-select">
                                            <option value="">선택</option>
                                            <option value="CONTRACT">계약</option>
                                            <option value="HOLD">보류</option>
                                            <option value="REJECT">거절</option>
                                        </select>
                                    </div>

                                    <div class="ev-admin-form-field">
                                        <label for="adminReply" class="ev-admin-form-label">관리자 답변</label>
                                        <textarea id="adminReply"
                                                  class="ev-admin-textarea"
                                                  placeholder="답변 내용을 입력하세요."></textarea>
                                    </div>
                                </div>

                                <div class="ev-admin-actions">
                                    <button type="button" class="ev-admin-btn ev-admin-btn--primary">저장</button>
                                    <button type="button" class="ev-admin-btn ev-admin-btn--secondary">초기화</button>
                                </div>
                            </div>

                            <div class="ev-admin-empty ev-admin-consultation-detail-empty" th:if="${selectedConsultation == null}">
                                좌측 목록에서 상담을 선택하면 상태 변경 및 답변 입력이 가능합니다.
                            </div>
                        </div>
                    </aside>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin/admin-consultation.js}"></script>
</body>
</html>
