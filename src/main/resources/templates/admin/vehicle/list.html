<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>차량관리 - EVCar Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin-common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin-vehicle.css}">
</head>
<body>
<div class="ev-admin-app">
    <div class="ev-admin-layout">
        <div th:replace="~{layout/adminSidebar :: adminSidebar('vehicle')}"></div>

        <main class="ev-admin-main">
            <div class="ev-admin-shell">
                <header class="ev-admin-page-header">
                    <div class="ev-admin-page-header__breadcrumb">관리자 &gt; 차량관리</div>
                    <h1 class="ev-admin-page-header__title">차량 관리</h1>
                    <p class="ev-admin-page-header__desc">차량 상태 필터와 키워드 검색으로 차량 정보를 관리할 수 있습니다.</p>
                </header>

                <section class="ev-admin-card">
                    <div class="ev-admin-card__body">
                        <div class="ev-admin-alert js-admin-alert"
                             th:if="${message}"
                             th:text="${message}">
                            차량 정보가 수정되었습니다.
                        </div>

                        <div class="ev-admin-toolbar">
                            <form th:action="@{/admin/vehicle}" method="get" class="ev-admin-toolbar__row">
                                <input type="hidden" name="keyword" th:value="${keyword}">
                                <div class="ev-admin-filter-group">
                                    <button type="submit"
                                            name="status"
                                            value=""
                                            class="ev-admin-chip"
                                            th:classappend="${selectedStatus == null or selectedStatus == ''} ? ' is-active' : ''">
                                        전체
                                    </button>
                                    <button type="submit"
                                            name="status"
                                            value="ACTIVE"
                                            class="ev-admin-chip"
                                            th:classappend="${selectedStatus == 'ACTIVE'} ? ' is-active' : ''">
                                        판매중
                                    </button>
                                    <button type="submit"
                                            name="status"
                                            value="SOLD_OUT"
                                            class="ev-admin-chip"
                                            th:classappend="${selectedStatus == 'SOLD_OUT'} ? ' is-active' : ''">
                                        품절
                                    </button>
                                </div>
                            </form>

                            <div class="ev-admin-toolbar__row">
                                <form th:action="@{/admin/vehicle}" method="get" class="ev-admin-vehicle-search-form">
                                    <input type="hidden" name="status" th:value="${selectedStatus}">
                                    <input type="text"
                                           name="keyword"
                                           class="ev-admin-input ev-admin-vehicle-search"
                                           placeholder="브랜드명 또는 차량모델명 검색"
                                           th:value="${keyword}">
                                    <button type="submit" class="ev-admin-btn ev-admin-btn--secondary">검색</button>
                                </form>

                                <a th:href="@{/admin/vehicle/form}" class="ev-admin-btn ev-admin-btn--primary">
                                    차량 등록
                                </a>
                            </div>
                        </div>

                        <div class="ev-admin-table-wrap"
                             th:if="${vehicleList != null and !#lists.isEmpty(vehicleList)}">
                            <table class="ev-admin-table ev-admin-vehicle-table">
                                <colgroup>
                                    <col class="ev-admin-vehicle-col-image">
                                    <col class="ev-admin-vehicle-col-id">
                                    <col class="ev-admin-vehicle-col-brand">
                                    <col class="ev-admin-vehicle-col-model">
                                    <col class="ev-admin-vehicle-col-class">
                                    <col class="ev-admin-vehicle-col-price">
                                    <col class="ev-admin-vehicle-col-status">
                                    <col class="ev-admin-vehicle-col-date">
                                    <col class="ev-admin-vehicle-col-date">
                                    <col class="ev-admin-vehicle-col-actions">
                                </colgroup>
                                <thead>
                                <tr>
                                    <th>대표이미지</th>
                                    <th>차량ID</th>
                                    <th>브랜드</th>
                                    <th>모델명</th>
                                    <th>차급</th>
                                    <th>기본가(만원)</th>
                                    <th>상태</th>
                                    <th>등록일</th>
                                    <th>수정일</th>
                                    <th>관리</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="vehicle : ${vehicleList}">
                                    <td>
                                        <div class="ev-admin-vehicle-thumb-box">
                                            <img th:if="${vehicle.imageUrl != null and !#strings.isEmpty(vehicle.imageUrl)}"
                                                 th:src="${vehicle.imageUrl}"
                                                 th:alt="${vehicle.modelName}"
                                                 class="ev-admin-vehicle-thumb"
                                                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                                            <div class="ev-admin-vehicle-thumb-fallback"
                                                 th:style="${vehicle.imageUrl != null and !#strings.isEmpty(vehicle.imageUrl)} ? 'display:none;' : 'display:flex;'">
                                                NO IMAGE
                                            </div>
                                        </div>
                                    </td>
                                    <td th:text="${vehicle.vehicleId}">HD0006</td>
                                    <td th:text="${vehicle.brand}">HYUNDAI</td>
									<td class="ev-admin-vehicle-model-cell">
									    <div class="ev-admin-vehicle-model" th:text="${vehicle.modelNameLabel}">아이오닉 5</div>
									</td>
									<td th:text="${vehicle.vehicleClassLabel}">중형 SUV</td>
                                    <td th:text="${vehicle.priceBasicFormatted}">6,700만원</td>
                                    <td>
                                        <span class="ev-admin-badge"
                                              th:classappend="${vehicle.vehicleStatus == 'SOLD_OUT'} ? ' ev-admin-badge--danger' : ' ev-admin-badge--success'"
                                              th:text="${vehicle.vehicleStatusLabel}">
                                            판매중
                                        </span>
                                    </td>
                                    <td th:text="${vehicle.createdAtFormatted}">2024-11-20 00:00</td>
                                    <td th:text="${vehicle.updatedAtFormatted}">2025-03-15 00:00</td>
                                    <td>
                                        <div class="ev-admin-vehicle-actions">
                                            <a th:href="@{/admin/vehicle/{vehicleId}/form(vehicleId=${vehicle.vehicleId})}"
                                               class="ev-admin-btn ev-admin-btn--secondary ev-admin-btn--sm">
                                                수정
                                            </a>
                                            <form th:action="@{/admin/vehicle/{vehicleId}/delete(vehicleId=${vehicle.vehicleId})}"
                                                  method="post"
                                                  class="ev-admin-delete-form">
                                                <button type="submit"
                                                        class="ev-admin-btn ev-admin-btn--danger ev-admin-btn--sm">
                                                    삭제
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="ev-admin-empty"
                             th:if="${vehicleList == null or #lists.isEmpty(vehicleList)}">
                            등록된 차량 데이터가 없습니다.
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin/admin-vehicle.js}"></script>
</body>
</html>
