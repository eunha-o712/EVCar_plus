<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>비밀번호 변경</title>

<style>

body{
    margin:0;
    font-family:"돋움", Dotum, sans-serif;
    background:#f3f4f6;
}

.container{
    max-width:500px;
    width:90%;
    margin:80px auto;
}

/* 제목 */
.title{
    font-size:30px;
    font-weight:bold;
    text-align:center;
    margin-bottom:30px;
}

/* 입력 */
.form-row{
    margin-bottom:15px;
}

.form-row label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    height:45px;
    padding:8px 12px;
    border:1px solid #ccc;
    border-radius:4px;
}

/* 버튼 */
.button-area{
    margin-top:20px;
    display:flex;
    gap:10px;
}

.btn{
    flex:1;
    height:45px;
    background:#3f6fb5;
    color:white;
    border:none;
    cursor:pointer;
}

.back-btn{
    background:#6c757d;
}

/* 메시지 */
.msg{
    margin-top:15px;
    padding:10px;
    border:1px solid red;
    color:red;
    background:#fff;
    text-align:center;
}

.success{
    border-color:green;
    color:green;
}

</style>

</head>

<body>

<div class="container">

<div class="title">비밀번호 변경</div>

<form th:action="@{/login/reset-pw}" 
      th:object="${passwordResetDto}" 
      method="post"
      id="pwForm">

<!-- 아이디 -->
<div class="form-row">
<label>아이디</label>
<input type="text" th:field="*{loginId}" readonly>
</div>

<!-- 이름 -->
<div class="form-row">
<label>이름</label>
<input type="text" th:field="*{name}" readonly>
</div>

<!-- 이메일 -->
<div class="form-row">
<label>이메일</label>
<input type="email" th:field="*{email}" readonly>
</div>

<!-- 새 비밀번호 -->
<div class="form-row">
<label>새 비밀번호</label>
<input type="password" th:field="*{newPassword}" required>
</div>

<!-- 비밀번호 확인 -->
<div class="form-row">
<label>비밀번호 확인</label>
<input type="password" th:field="*{newPasswordConfirm}" id="pwConfirm" required>
</div>

<div class="button-area">
<button type="submit" class="btn">변경하기</button>
<button type="button" class="btn back-btn" onclick="location.href='/login'">돌아가기</button>
</div>

</form>

<!-- 메시지 -->
<div th:if="${errorMessage}" class="msg">
    <span th:text="${errorMessage}"></span>
</div>

<div th:if="${successMessage}" class="msg success">
    <span th:text="${successMessage}"></span>
</div>

</div>

<script>

// 비밀번호 확인 체크
document.getElementById("pwForm").addEventListener("submit", function(e){

    const pw = this.newPassword.value.trim();
    const confirm = this.newPasswordConfirm.value.trim();

    if(!pw || !confirm){
        alert("비밀번호를 입력해주세요.");
        e.preventDefault();
        return;
    }

    if(pw !== confirm){
        alert("비밀번호가 일치하지 않습니다.");
        e.preventDefault();
    }

});

// 서버 결과 처리
window.onload = function(){

    const success = "[[${successMessage}]]";
    const error = "[[${errorMessage}]]";

    if(error && error !== "null"){
        alert(error);
    }

    if(success && success !== "null"){
        alert(success);
        location.href = "/login";
    }

};

</script>

</body>
</html>
