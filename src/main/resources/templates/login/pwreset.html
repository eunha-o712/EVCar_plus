<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 변경</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/common/common.css}">
    <link rel="stylesheet" th:href="@{/css/common/main.css}">

    <style>
        body {
            margin: 0;
            font-family: "돋움", Dotum, sans-serif;
            background: #f3f4f6;
        }

        .container {
            max-width: 500px;
            width: 90%;
            margin: 80px auto;
        }

        .title {
            font-size: 30px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-row {
            margin-bottom: 15px;
        }

        .form-row label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            height: 45px;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .button-area {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            height: 45px;
            background: #3f6fb5;
            color: white;
            border: none;
            cursor: pointer;
        }

        .back-btn {
            background: #6c757d;
        }

        .msg {
            margin-top: 15px;
            padding: 10px;
            border: 1px solid red;
            color: red;
            background: #fff;
            text-align: center;
        }

        .success {
            border-color: green;
            color: green;
        }
    </style>
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<div class="container">
    <div class="title">비밀번호 변경</div>

    <form th:action="@{/login/change-pw}"
          th:object="${passwordResetDto}"
          method="post"
          id="pwForm">

        <input type="hidden" th:field="*{loginId}">
        <input type="hidden" th:field="*{name}">
        <input type="hidden" th:field="*{email}">

        <div class="form-row">
            <label for="loginIdView">아이디</label>
            <input type="text" id="loginIdView" th:value="*{loginId}" readonly>
        </div>

        <div class="form-row">
            <label for="nameView">이름</label>
            <input type="text" id="nameView" th:value="*{name}" readonly>
        </div>

        <div class="form-row">
            <label for="emailView">이메일</label>
            <input type="email" id="emailView" th:value="*{email}" readonly>
        </div>

        <div class="form-row">
            <label for="newPassword">새 비밀번호</label>
            <input type="password"
                   id="newPassword"
                   th:field="*{newPassword}"
                   pattern="^(?=.*[a-zA-Z])(?=.*[0-9])[a-zA-Z0-9]{8,20}$"
                   title="비밀번호는 영문과 숫자를 포함한 8~20자입니다."
                   required>
        </div>

        <div class="form-row">
            <label for="newPasswordConfirm">비밀번호 확인</label>
            <input type="password"
                   id="newPasswordConfirm"
                   th:field="*{newPasswordConfirm}"
                   required>
        </div>

        <div class="button-area">
            <button type="submit" class="btn">변경하기</button>
            <button type="button" class="btn back-btn" onclick="location.href='/login'">돌아가기</button>
        </div>
    </form>

    <div th:if="${errorMessage}" class="msg">
        <span th:text="${errorMessage}"></span>
    </div>

    <div th:if="${successMessage}" class="msg success">
        <span th:text="${successMessage}"></span>
    </div>
</div>

<div th:replace="~{layout/footer :: footer}"></div>

<script th:inline="javascript">
    'use strict';

    document.getElementById('pwForm').addEventListener('submit', function (event) {
        const pw = this.newPassword.value.trim();
        const confirmPw = this.newPasswordConfirm.value.trim();
        const pwRegex = /^(?=.*[a-zA-Z])(?=.*[0-9])[a-zA-Z0-9]{8,20}$/;

        if (!pw || !confirmPw) {
            alert('비밀번호를 입력해주세요.');
            event.preventDefault();
            return;
        }

        if (!pwRegex.test(pw)) {
            alert('비밀번호는 영문과 숫자를 반드시 포함한 8~20자여야 합니다.');
            this.newPassword.focus();
            event.preventDefault();
            return;
        }

        if (pw !== confirmPw) {
            alert('비밀번호가 일치하지 않습니다.');
            event.preventDefault();
        }
    });

    window.addEventListener('load', () => {
        const success = /*[[${successMessage}]]*/ null;
        const error = /*[[${errorMessage}]]*/ null;

        if (error) {
            alert(error);
        }

        if (success) {
            alert(success);
            window.location.href = '/login';
        }
    });
</script>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/common/header.js}"></script>
<script th:src="@{/js/common/footer.js}"></script>
<script th:src="@{/js/common/main.js}"></script>
</body>
</html>
