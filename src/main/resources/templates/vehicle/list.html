<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전기차 조회 - EV Consulting</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link th:href="@{/css/vehicle/vehicle-list.css}" rel="stylesheet">
</head>
<body>

	<!-- 헤더 -->
	<div th:replace="~{layout/header :: header}"></div>

	<div class="container-fluid px-4 py-3">

		<h2 class="fw-bold mb-3" style="font-size: 1.4rem;">전기차 조회</h2>

		<!-- 브랜드 필터 -->
		<div class="bg-white px-3 py-2 mb-2 rounded border">
			<div class="d-flex align-items-center gap-2 flex-wrap">
				<span class="filter-label">브랜드</span>
				<button type="button" class="filter-btn"
					th:each="brand : ${ {'전체','현대','기아'} }" th:text="${brand}"
					th:classappend="${brand == selectedBrand} ? ' active'"
					th:data-brand="${brand}" th:data-class="${selectedClass}"
					onclick="filterByData(this)"></button>
			</div>
		</div>

		<div class="bg-white px-3 py-2 mb-2 rounded border">
			<div class="d-flex align-items-center gap-2 flex-wrap">

				<span class="filter-label">차급</span>

				<button type="button" class="filter-btn"
					th:classappend="${selectedClass == ''} ? ' active'"
					th:data-brand="${selectedBrand}" data-class=""
					onclick="filterByData(this)">전체</button>

				<button type="button" class="filter-btn"
					th:classappend="${selectedClass == 'MINI'} ? ' active'"
					th:data-brand="${selectedBrand}" data-class="MINI"
					onclick="filterByData(this)">경형</button>

				<button type="button" class="filter-btn"
					th:classappend="${selectedClass == 'MINI_SUV'} ? ' active'"
					th:data-brand="${selectedBrand}" data-class="MINI_SUV"
					onclick="filterByData(this)">경형SUV</button>

				<button type="button" class="filter-btn"
					th:classappend="${selectedClass == 'SMALL_SUV'} ? ' active'"
					th:data-brand="${selectedBrand}" data-class="SMALL_SUV"
					onclick="filterByData(this)">소형SUV</button>

				<button type="button" class="filter-btn"
					th:classappend="${selectedClass == 'MID_SUV'} ? ' active'"
					th:data-brand="${selectedBrand}" data-class="MID_SUV"
					onclick="filterByData(this)">중형SUV</button>

				<button type="button" class="filter-btn"
					th:classappend="${selectedClass == 'LARGE_SUV'} ? ' active'"
					th:data-brand="${selectedBrand}" data-class="LARGE_SUV"
					onclick="filterByData(this)">대형SUV</button>

				<button type="button" class="filter-btn"
					th:classappend="${selectedClass == 'MID_SEDAN'} ? ' active'"
					th:data-brand="${selectedBrand}" data-class="MID_SEDAN"
					onclick="filterByData(this)">세단</button>

				<button type="button" class="filter-btn"
					th:classappend="${selectedClass == 'PERFORMANCE'} ? ' active'"
					th:data-brand="${selectedBrand}" data-class="PERFORMANCE"
					onclick="filterByData(this)">고성능</button>

			</div>
		</div>

		<!-- 결과 건수 -->
		<div class="result-header mb-3">
			조회 결과 <strong th:text="${totalCount}">0</strong>건
		</div>

		<!-- 차량 카드 목록 -->
		<div class="row g-3">

			<!-- 결과 없을 때 -->
			<div class="col-12 text-center text-muted py-5"
				th:if="${#lists.isEmpty(vehicleList)}">조회된 차량이 없습니다.</div>

			<!-- 차량 카드 -->
			<div class="col-12 col-sm-6 col-md-4 col-lg-4"
				th:each="v : ${vehicleList}">
				<div class="vehicle-card" th:data-id="${v.vehicleId}"
					onclick="goDetail(this)">

					<!-- 이미지 -->
					<div class="vehicle-img-box">
						<img th:src="${v.imageUrl}" th:alt="${v.modelName}"
							onerror="this.src='/images/evcar_logo.png'">
					</div>

					<!-- 카드 정보 -->
					<div class="card-body-inner">
						<div class="card-brand" th:text="${v.brand}">브랜드</div>
						<div class="card-model" th:text="${v.modelName}">모델명</div>
						<div class="card-price" th:text="${v.priceBasicFormatted}">가격</div>
					</div>

				</div>
			</div>

		</div>

		<!-- 페이지네이션 -->
		<div class="d-flex justify-content-center mt-4 gap-2"
			th:if="${totalPages > 1}">
			<button type="button" class="filter-btn"
				th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
				th:text="${i + 1}" th:classappend="${i == currentPage} ? ' active'"
				th:data-brand="${selectedBrand}" th:data-class="${selectedClass}"
				th:data-page="${i}" onclick="goPage(this)"></button>
		</div>

	</div>

	<!-- 푸터 -->
	<div th:replace="~{layout/footer :: footer}"></div>

	<!-- AI 플로팅 버튼 -->
	<button class="ai-fab" onclick="alert('AI 챗봇 준비 중입니다.')">AI</button>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script>
		function filterByData(btn) {
			const brand = btn.getAttribute('data-brand');
			const vehicleClass = btn.getAttribute('data-class');
			location.href = '/vehicle/list?brand=' + encodeURIComponent(brand)
					+ '&vehicleClass=' + encodeURIComponent(vehicleClass);
		}

		function goDetail(card) {
			const id = card.getAttribute('data-id');
			location.href = '/vehicle/' + id;
		}

		function goPage(btn) {
			const brand = btn.getAttribute('data-brand');
			const vehicleClass = btn.getAttribute('data-class');
			const page = btn.getAttribute('data-page');
			location.href = '/vehicle/list?brand=' + encodeURIComponent(brand)
					+ '&vehicleClass=' + encodeURIComponent(vehicleClass)
					+ '&page=' + page;
		}
	</script>
</body>
</html>
