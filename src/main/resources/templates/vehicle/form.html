<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>차량관리 - EVCar Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin-common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin-vehicle.css}">
</head>
<body>
<div class="ev-admin-app">
    <div class="ev-admin-layout">
        <div th:replace="~{layout/adminSidebar :: adminSidebar('vehicle')}"></div>

        <main class="ev-admin-main">
            <div class="ev-admin-shell">
                <header class="ev-admin-page-header">
                    <div class="ev-admin-page-header__breadcrumb">관리자 &gt; 차량관리</div>
                    <h1 class="ev-admin-page-header__title"
                        th:text="${isEditMode} ? '차량 정보 수정' : '차량 신규등록'">
                        차량 신규등록
                    </h1>
                    <p class="ev-admin-page-header__desc">
                        등록/수정 공용 폼이며, 백엔드 연결 전까지는 입력 구조만 사용하면 됩니다.
                    </p>
                </header>

                <section class="ev-admin-card">
                    <div class="ev-admin-card__body">
                        <form class="ev-admin-form-grid ev-admin-form-grid--2" action="#" method="post" enctype="multipart/form-data">
                            <div class="ev-admin-form-field" th:if="${isEditMode}">
                                <label class="ev-admin-form-label" for="vehicleStatus">차량 상태</label>
                                <div class="ev-admin-inline">
                                    <button type="button" class="ev-admin-chip is-active">판매중</button>
                                    <button type="button" class="ev-admin-chip">품절</button>
                                </div>
                                <input type="hidden" id="vehicleStatus" name="vehicleStatus" value="ACTIVE">
                            </div>

                            <div class="ev-admin-form-field">
                                <label class="ev-admin-form-label" for="brandName">브랜드명 *</label>
                                <select id="brandName" name="brandName" class="ev-admin-select">
                                    <option value="">선택</option>
                                    <option value="HYUNDAI">현대</option>
                                    <option value="KIA">기아</option>
                                </select>
                            </div>

                            <div class="ev-admin-form-field">
                                <label class="ev-admin-form-label" for="vehicleModelName">차량모델명 *</label>
                                <input type="text"
                                       id="vehicleModelName"
                                       name="vehicleModelName"
                                       class="ev-admin-input"
                                       placeholder="모델명 입력">
                            </div>

                            <div class="ev-admin-form-field">
                                <label class="ev-admin-form-label" for="vehicleType">차급 *</label>
                                <select id="vehicleType" name="vehicleType" class="ev-admin-select">
                                    <option value="">선택</option>
                                    <option value="LIGHT_SUV">경형SUV</option>
                                    <option value="SMALL_SUV">소형SUV</option>
                                    <option value="MIDDLE_SUV">중형SUV</option>
                                    <option value="LARGE_SUV">대형SUV</option>
                                    <option value="SEDAN">세단</option>
                                    <option value="PERFORMANCE">고성능</option>
                                </select>
                            </div>

                            <div class="ev-admin-form-field">
                                <label class="ev-admin-form-label" for="basePrice">기본가 (만원) *</label>
                                <input type="number"
                                       id="basePrice"
                                       name="basePrice"
                                       class="ev-admin-input"
                                       placeholder="금액 입력">
                            </div>

                            <div class="ev-admin-form-field">
                                <label class="ev-admin-form-label" for="premiumPrice">프리미엄가 (만원)</label>
                                <input type="number"
                                       id="premiumPrice"
                                       name="premiumPrice"
                                       class="ev-admin-input"
                                       placeholder="금액 입력">
                            </div>

                            <div class="ev-admin-form-field">
                                <label class="ev-admin-form-label" for="drivingRange">1회충전 주행거리 *</label>
                                <input type="number"
                                       id="drivingRange"
                                       name="drivingRange"
                                       class="ev-admin-input"
                                       placeholder="km 입력">
                            </div>

                            <div class="ev-admin-form-field">
                                <label class="ev-admin-form-label" for="fastChargeTime">급속충전 시간 *</label>
                                <input type="text"
                                       id="fastChargeTime"
                                       name="fastChargeTime"
                                       class="ev-admin-input"
                                       placeholder="예: 18분">
                            </div>

                            <div class="ev-admin-form-field">
                                <label class="ev-admin-form-label" for="slowChargeTime">완속충전 시간</label>
                                <input type="text"
                                       id="slowChargeTime"
                                       name="slowChargeTime"
                                       class="ev-admin-input"
                                       placeholder="예: 7시간">
                            </div>

                            <div class="ev-admin-form-field">
                                <label class="ev-admin-form-label" for="chargeType">충전방식 *</label>
                                <select id="chargeType" name="chargeType" class="ev-admin-select">
                                    <option value="">선택</option>
                                    <option value="FAST">급속</option>
                                    <option value="SLOW">완속</option>
                                    <option value="BOTH">급속/완속</option>
                                </select>
                            </div>

                            <div class="ev-admin-form-field">
                                <label class="ev-admin-form-label" for="batteryCapacity">배터리 용량 *</label>
                                <input type="number"
                                       step="0.1"
                                       id="batteryCapacity"
                                       name="batteryCapacity"
                                       class="ev-admin-input"
                                       placeholder="kWh 입력">
                            </div>

                            <div class="ev-admin-form-field ev-admin-form-field--full">
                                <label class="ev-admin-form-label" for="catalogUrl">카탈로그 링크</label>
                                <input type="url"
                                       id="catalogUrl"
                                       name="catalogUrl"
                                       class="ev-admin-input"
                                       placeholder="URL 입력">
                            </div>

                            <div class="ev-admin-form-field">
                                <label class="ev-admin-form-label" for="vehicleImage">차량 이미지</label>
                                <input type="file"
                                       id="vehicleImage"
                                       name="vehicleImage"
                                       class="ev-admin-file"
                                       accept="image/*">
                                <p class="ev-admin-form-help">이미지 업로드 전까지는 미리보기 영역만 노출됩니다.</p>
                            </div>

                            <div class="ev-admin-form-field">
                                <label class="ev-admin-form-label">이미지 미리보기</label>
                                <div class="ev-admin-preview" id="vehiclePreview">
                                    등록된 이미지가 없습니다.
                                </div>
                            </div>

                            <div class="ev-admin-form-field ev-admin-form-field--full">
                                <div class="ev-admin-actions">
                                    <button type="submit" class="ev-admin-btn ev-admin-btn--primary"
                                            th:text="${isEditMode} ? '저장하기' : '등록하기'">
                                        등록하기
                                    </button>
                                    <button type="button" class="ev-admin-btn ev-admin-btn--secondary">취소</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </section>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin/admin-vehicle.js}"></script>
</body>
</html>
